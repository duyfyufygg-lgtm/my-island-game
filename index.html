<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Island Survival v2.0.4 - T-Rex Walk Only Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
      #main-menu, #tank-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 1000; color: white; text-align: center; }
      #tank-menu { background: rgba(0,0,0,0.95); z-index: 1100; }
      .skin-container { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; justify-content: center; max-width: 90%; }
      .skin-btn { width: 60px; height: 60px; border: 3px solid #fff; border-radius: 10px; cursor: pointer; overflow: hidden; }
      .skin-btn.active { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
      .skin-btn img { width: 100%; height: 100%; object-fit: cover; }
      .role-btn { padding: 12px; margin: 5px; width: 220px; border-radius: 10px; border: 2px solid #fff; background: #333; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }
      .tank-select-btn { padding: 20px; width: 250px; background: #ff9900; border: 3px solid #fff; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; color: black; }
      #ui-layer { position: absolute; top: 15px; left: 15px; z-index: 999; color: #fff; pointer-events: none; text-shadow: 2px 2px #000; }
      #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; }
      #controls-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 998; pointer-events: none; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
      .fire-btn { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; border-radius: 50%; background: #ff4444; color: white; border: 4px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; z-index: 1001; }
      .hidden { display: none !important; }
      #boss-announce { position: absolute; top: 50px; width: 100%; text-align: center; color: #ff0000; font-size: 30px; font-weight: bold; text-shadow: 3px 3px #000; z-index: 2000; pointer-events: none; }
    </style>
  </head>
  <body>

    <div id="boss-announce" class="hidden">GIANT BOSS 67 ปรากฏตัวแล้ว!</div>

    <div id="main-menu">
      <h1 style="color: #00ffcc;">เกาะมหาสนุก v2.0.4</h1>
      <p>1. เลือกสกิน</p>
      <div class="skin-container">
        <div class="skin-btn active" onclick="selectSkin('#imgRed', this)"><img src="jjs.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgBlue', this)"><img src="jjkl.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgHerta', this)"><img src="The Herta.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgSparcy', this)"><img src="Sparcy.png"></div>
        <div class="skin-btn" onclick="selectSkin('#img67', this)"><img src="67.png"></div>
      </div>
      <p>2. เลือกสายการเล่น</p>
      <button class="role-btn" onclick="startGame('P1')">มือปืน (ATK 50)</button>
      <button class="role-btn" onclick="startGame('P2')">มือขวาน (ATK 35 - ไวมาก)</button>
      <button class="role-btn" onclick="openTankMenu()">สายแทงค์ (ATK 15 - T-Rex)</button>
    </div>

    <div id="tank-menu" class="hidden">
      <h2 style="color: #ff9900;">T-REX TANK MODE</h2>
      <div class="skin-container">
        <div class="skin-btn active" style="width: 150px; height: 150px;"><img src="T-Rex_preview.png" alt="T-Rex"></div>
      </div>
      <button class="tank-select-btn" onclick="startGame('P3')">ยืนยันเลือก T-Rex</button>
      <br>
      <button style="color: white; background: none; border: none; cursor: pointer;" onclick="closeTankMenu()">กลับไปหน้าหลัก</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="my-id-text" style="color:gold; font-size:20px;"></div>
      <div>HP: <span id="hp-text">100</span></div>
      <div id="boss-hp-ui" class="hidden" style="color: #ff4444;">BOSS HP: <span id="boss-hp-text">3000</span></div>
    </div>

    <div id="touch-area" class="hidden"></div>
    <div id="controls-ui" class="hidden">
      <div id="joystick-zone"></div>
      <div id="shoot-btn" class="fire-btn">โจมตี!</div>
    </div>

    <a-scene renderer="colorManagement: true;">
      <a-assets>
        <a-asset-item id="gunModel" src="asd.glb"></a-asset-item>
        <a-asset-item id="axeModel" src="fps.glb"></a-asset-item> 
        <a-asset-item id="tankModel" src="T-Rex.glb"></a-asset-item>
        <a-asset-item id="islandModel" src="city.glb"></a-asset-item>
        <img id="imgRed" src="jjs.png"><img id="imgBlue" src="jjkl.png"><img id="imgHerta" src="The Herta.png"><img id="imgSparcy" src="Sparcy.png"><img id="img67" src="67.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity id="island" gltf-model="#islandModel" position="0 -1.5 -25" scale="0.1 0.1 0.1"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0">
          <a-entity id="weapon-P1" gltf-model="#gunModel" position="0.3 -0.4 -0.6" rotation="0 -10 0" scale="0.4 0.4 0.4" visible="false"></a-entity>
          <a-entity id="weapon-P2" position="0 0 0" visible="false">
             <a-entity id="axe-model-inner" gltf-model="#axeModel" position="0 -1.4 -1.2" rotation="0 180 0" scale="1.2 1.2 1.2" animation-mixer="clip: idle; loop: repeat;"></a-entity>
          </a-entity>
          <a-entity id="weapon-P3" gltf-model="#gunModel" position="0.3 -0.4 -0.6" rotation="0 -10 0" scale="0.4 0.4 0.4" visible="false"></a-entity>
          <a-entity id="cursor-visual" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018" material="color: #00ff00; shader: flat; opacity: 0.8"></a-entity>
        </a-entity>
        
        <a-image id="my-skin-display" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
        <a-entity id="my-tank-model" gltf-model="#tankModel" scale="1.5 1.5 1.5" position="0 -1.5 0" rotation="0 180 0" visible="false" animation-mixer="clip: walk; loop: repeat;"></a-entity>
      </a-entity>

      <a-entity id="boss-67" visible="false">
        <a-image src="#img67" width="20" height="20" position="0 10 0"></a-image>
        <a-box class="targetable" data-id="BOSS" opacity="0" width="18" height="25" depth="5" position="0 10 0"></a-box>
      </a-entity>

      <a-entity id="player-P1" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P1" opacity="0" width="4" height="5" depth="1" position="0 2 0"></a-box></a-entity>
      <a-entity id="player-P2" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P2" opacity="0" width="4" height="5" depth="1" position="0 2 0"></a-box></a-entity>
      <a-entity id="player-P3" visible="false">
         <a-entity id="player-P3-model" gltf-model="#tankModel" scale="1.5 1.5 1.5" position="0 -1.5 0" rotation="0 180 0" animation-mixer="clip: walk; loop: repeat;"></a-entity>
         <a-box class="targetable" data-id="P3" opacity="0" width="5" height="6" depth="3" position="0 1.5 0"></a-box>
      </a-entity>
    </a-scene>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = { databaseURL: "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/" };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let health = 100, myRole = "", mySkin = "#imgRed", yaw = 0, attackDistance = 100, moveSpeed = 0.3;
      let isMoving = false;

      window.selectSkin = function(s, b) {
        mySkin = s;
        document.querySelectorAll('.skin-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('my-skin-display').setAttribute('src', s);
      }

      window.openTankMenu = () => document.getElementById('tank-menu').classList.remove('hidden');
      window.closeTankMenu = () => document.getElementById('tank-menu').classList.add('hidden');

      const touchArea = document.getElementById('touch-area');
      let isDragging = false, lastX = 0;
      touchArea.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; });
      touchArea.addEventListener('touchmove', e => {
        if (!isDragging) return;
        let dx = e.touches[0].clientX - lastX; lastX = e.touches[0].clientX;
        yaw -= dx * 0.25; document.getElementById('camera').setAttribute('rotation', `0 ${yaw} 0`);
      });
      touchArea.addEventListener('touchend', () => isDragging = false);

      window.startGame = function(role) {
        myRole = role;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('tank-menu').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('touch-area').classList.remove('hidden');
        document.getElementById('controls-ui').classList.remove('hidden');

        if(role === 'P3') {
           health = 300; moveSpeed = 0.4;
           document.getElementById('my-skin-display').setAttribute('visible', false);
           document.getElementById('my-tank-model').setAttribute('visible', true);
           document.getElementById('my-id-text').innerText = "T-Rex Tank (HP: 300)";
           attackDistance = 10;
        } else {
           moveSpeed = (role === 'P2' ? 0.6 : 0.3);
           document.getElementById('my-id-text').innerText = (role === 'P2' ? 'มือขวาน' : 'มือปืน');
           attackDistance = (role === 'P2' ? 12 : 100);
        }
        
        document.getElementById('weapon-' + role).setAttribute('visible', true);

        setInterval(() => {
          update(ref(db, 'players/' + myRole), {
            p: document.getElementById('rig').getAttribute('position'),
            r: document.getElementById('camera').getAttribute('rotation'),
            hp: health, skin: (role === 'P3' ? 'TANK' : mySkin)
          });
        }, 50);

        onValue(ref(db, 'players'), (snap) => {
          const players = snap.val();
          for (let id in players) {
            if (id === myRole) {
              health = players[id].hp;
              document.getElementById('hp-text').innerText = health;
              if (health <= 0) update(ref(db, 'players/'+myRole), {hp: (role==='P3'?300:100)});
            } else {
              const ent = document.getElementById('player-' + id);
              if (ent) {
                ent.setAttribute('visible', players[id].hp > 0);
                ent.setAttribute('position', players[id].p);
                ent.setAttribute('rotation', players[id].r);
                if(players[id].skin !== 'TANK') {
                  ent.querySelector('a-image').setAttribute('src', players[id].skin);
                }
              }
            }
          }
        });
        initJoystick();
      }

      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(myRole === 'P2') {
          const axe = document.getElementById('axe-model-inner');
          axe.setAttribute('animation-mixer', 'clip: attack; loop: once;');
          setTimeout(() => axe.setAttribute('animation-mixer', 'clip: idle; loop: repeat;'), 800);
        }

        const cam = document.getElementById('camera');
        const ray = new THREE.Raycaster();
        ray.far = attackDistance;
        const p = new THREE.Vector3(), q = new THREE.Quaternion(), d = new THREE.Vector3(0,0,-1);
        cam.object3D.getWorldPosition(p); cam.object3D.getWorldQuaternion(q);
        d.applyQuaternion(q); ray.set(p, d);

        const hits = ray.intersectObjects(Array.from(document.querySelectorAll('.targetable')).map(t => t.getObject3D('mesh')).filter(m => m));

        if (hits.length > 0) {
          const tid = hits[0].object.el.dataset.id;
          let dmg = (myRole === 'P1' ? 50 : (myRole === 'P2' ? 35 : 15));
          if (tid === "BOSS") {
            onValue(ref(db, `world/boss/hp`), s => {
              let cur = s.val() || 0;
              if (cur > 0) update(ref(db, `world/boss`), { hp: cur - dmg });
            }, { onlyOnce: true });
          } else if (tid !== myRole) {
            onValue(ref(db, `players/${tid}/hp`), s => update(ref(db, `players/${tid}`), { hp: (s.val() || 100) - dmg }), { onlyOnce: true });
          }
        }
      });

      setInterval(() => {
        update(ref(db, 'world/boss'), { hp: 3000, pos: {x: (Math.random()-0.5)*20, y: -1.5, z: -(Math.random()*20+15)}, active: true });
        document.getElementById('boss-announce').classList.remove('hidden');
        setTimeout(() => document.getElementById('boss-announce').classList.add('hidden'), 5000);
      }, 300000);

      onValue(ref(db, 'world/boss'), (snap) => {
        const b = snap.val();
        const bEl = document.getElementById('boss-67'), bUI = document.getElementById('boss-hp-ui');
        if (b && b.active && b.hp > 0) {
          bEl.setAttribute('visible', true); bEl.setAttribute('position', b.pos);
          bUI.classList.remove('hidden'); document.getElementById('boss-hp-text').innerText = b.hp;
        } else { bEl.setAttribute('visible', false); bUI.classList.add('hidden'); }
      });

      function initJoystick() {
        nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' })
        .on('move', (evt, data) => {
          isMoving = true;
          const rig = document.querySelector('#rig'), cam = document.querySelector('#camera');
          let r = cam.getAttribute('rotation').y * Math.PI / 180;
          let p = rig.getAttribute('position');
          let f = Math.sin(data.angle.radian) * moveSpeed, s = Math.cos(data.angle.radian) * moveSpeed;
          p.x -= (Math.sin(r) * f + Math.cos(r) * s);
          p.z -= (Math.cos(r) * f - Math.sin(r) * s);
          rig.setAttribute('position', p);
        })
        .on('end', () => isMoving = false);
      }
    </script>
  </body>
                                                                     </html>
