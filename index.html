<!DOCTYPE html>
<html>
  <head>
    <title>Island Survival - FULL NO-CUT EDITION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script src="https://unpkg.com/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/networked-aframe@0.12.0/dist/networked-aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
      #main-menu { position: fixed; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
      .team-btn { padding: 20px 40px; font-size: 24px; margin: 10px; border-radius: 15px; border: 3px solid #fff; cursor: pointer; width: 260px; font-weight: bold; transition: 0.2s; }
      
      #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 160px; height: 160px; pointer-events: auto; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
      #shoot-btn { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; border-radius: 50%; background: #ff0000; border: 5px solid white; pointer-events: auto; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; box-shadow: 0 0 20px red; }
      
      #skin-selection { position: absolute; top: 20px; right: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 8px; }
      .skin-opt { padding: 10px 15px; background: rgba(0,0,0,0.8); color: #00ffcc; border: 2px solid #00ffcc; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; }
      
      #hud-display { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 26px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
      #conn-info { position: absolute; bottom: 10px; right: 10px; color: #0f0; font-size: 12px; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="main-menu">
      <h1 style="color:#00ffcc; text-shadow: 0 0 10px #00ffcc;">TEAM SURVIVAL ONLINE</h1>
      <button class="team-btn" style="background:#ff4d4d" onclick="launchGame('red')">JOIN RED TEAM</button>
      <button class="team-btn" style="background:#4d94ff" onclick="launchGame('blue')">JOIN BLUE TEAM</button>
      <p id="net-log" style="color: yellow; margin-top: 15px;">สถานะ: รอการเชื่อมต่อ...</p>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="hud-display">
        <div id="timer-val">05:00</div>
        <div id="score-val" style="font-size: 18px;">RED: 0 | BLUE: 0</div>
      </div>

      <div id="skin-selection">
        <div class="skin-opt" onclick="updateMySkin('jjs.png')">SKIN 1</div>
        <div class="skin-opt" onclick="updateMySkin('jjkl.png')">SKIN 2</div>
        <div class="skin-opt" onclick="updateMySkin('The Herta.png')">SKIN 3</div>
        <div class="skin-opt" onclick="updateMySkin('Sparcy.png')">SKIN 4</div>
      </div>

      <div id="joystick-zone"></div>
      <div id="shoot-btn">FIRE!!</div>
      <div id="conn-info">CONNECTED</div>
    </div>

    <a-scene networked-scene="serverURL: https://naf-examples.glitch.me/; app: master_war_ultimate_v9; room: secret_arena_888; adapter: socketio; debug: true;">
      <a-assets>
        <a-asset-item id="gun-model-file" src="asd.glb"></a-asset-item>
        <a-asset-item id="city-model-file" src="city.glb"></a-asset-item>
        <img id="img-s1" src="jjs.png">
        <img id="img-s2" src="jjkl.png">
        <img id="img-s3" src="The Herta.png">
        <img id="img-s4" src="Sparcy.png">

        <template id="player-template">
          <a-entity class="player-avatar">
            <a-sphere class="team-dot" radius="0.25" position="0 2.3 0"></a-sphere>
            <a-image class="skin-display" src="#img-s1" width="2" height="2" position="0 1 0"></a-image>
          </a-entity>
        </template>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity gltf-model="#city-model-file" position="0 -1.5 -30" scale="0.1 0.1 0.1"></a-entity>
      <a-plane rotation="-90 0 0" width="1000" height="1000" color="#222" material="opacity: 0.2; transparent: true"></a-plane>

      <a-entity id="rig" position="0 0 0" networked="template: #player-template; attachTemplateToLocal: false;">
        <a-entity id="main-cam" camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: false; touchEnabled: true;">
          <a-entity id="fps-gun" gltf-model="#gun-model-file" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4"></a-entity>
          <a-entity id="reticle" cursor position="0 0 -1" geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015" material="color: #00ff00; shader: flat" raycaster="objects: .player-avatar; far: 100"></a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let currentTeam = '';
      const fireSnd = new Audio("https://actions.google.com/sounds/v1/weapons/fire_arm_gunshot.ogg");

      // ตรวจสอบการเชื่อมต่อออนไลน์
      document.body.addEventListener('connected', (e) => {
        document.getElementById('net-log').innerText = "สถานะ: ออนไลน์พร้อมเห็นคนจริง!";
        document.getElementById('net-log').style.color = "#0f0";
      });

      // ตั้งค่า Network Schema ให้ส่งค่าสกินและสีทีม
      if (typeof NAF !== 'undefined') {
        NAF.schemas.add({
          template: '#player-template',
          components: ['position', 'rotation', { selector: '.team-dot', component: 'material.color' }, { selector: '.skin-display', component: 'src' }]
        });
      }

      function launchGame(team) {
        currentTeam = team;
        fireSnd.play().then(() => { fireSnd.pause(); fireSnd.currentTime = 0; });
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        
        const myDot = document.querySelector('#rig .team-dot');
        if(myDot) myDot.setAttribute('material', 'color', team);

        setupControls();
        runTimer();
      }

      function updateMySkin(file) {
        const myImg = document.querySelector('#rig .skin-display');
        if(myImg) myImg.setAttribute('src', file);
      }

      function setupControls() {
        nipplejs.create({
          zone: document.getElementById('joystick-zone'),
          mode: 'static',
          position: { left: '80px', bottom: '80px' },
          color: 'white',
          size: 120
        }).on('move', (evt, data) => {
          const rig = document.getElementById('rig');
          const cam = document.getElementById('main-cam');
          const rotY = cam.getAttribute('rotation').y * Math.PI / 180;
          const pos = rig.getAttribute('position');
          const spd = 0.22;
          const fwd = Math.sin(data.angle.radian) * spd;
          const side = Math.cos(data.angle.radian) * spd;
          pos.x -= (Math.sin(rotY) * fwd + Math.cos(rotY) * side);
          pos.z -= (Math.cos(rotY) * fwd - Math.sin(rotY) * side);
          rig.setAttribute('position', pos);
        });
      }

      // ระบบยิง
      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        fireSnd.currentTime = 0;
        fireSnd.play();

        // เอฟเฟกต์ปืนถีบ
        const gun = document.getElementById('fps-gun');
        gun.setAttribute('position', '0.3 -0.4 -0.5');
        setTimeout(() => gun.setAttribute('position', '0.3 -0.4 -0.6'), 60);

        // เช็คการยิงโดน
        const ray = document.getElementById('reticle').components.raycaster;
        if (ray.intersections.length > 0) {
          const target = ray.intersections[0].object.el;
          const netId = NAF.utils.getNetworkId(target);
          if (netId) NAF.connection.broadcastData('hit', { id: netId, fromTeam: currentTeam });
        }
      });

      // ล็อคหน้าจอไม่ให้มุดดินหรือเงยฟ้า (Fix VR Look)
      setInterval(() => {
        const cam = document.getElementById('main-cam');
        const rot = cam.getAttribute('rotation');
        cam.setAttribute('rotation', {x: 0, y: rot.y, z: 0});
      }, 10);

      function runTimer() {
        let sec = 300;
        setInterval(() => {
          if(sec > 0) {
            sec--;
            let m = Math.floor(sec/60);
            let s = sec%60;
            document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
          }
        }, 1000);
      }
    </script>
  </body>
</html>
