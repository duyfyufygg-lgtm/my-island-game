<!DOCTYPE html>
<html>
  <head>
    <title>Island Survival - P2P CONNECTION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
      #lobby { position: fixed; inset: 0; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
      input { padding: 10px; font-size: 18px; width: 80%; margin: 10px 0; border-radius: 8px; border: none; }
      .btn { padding: 15px 30px; font-size: 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; width: 250px; margin: 5px; }
      
      #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; pointer-events: auto; background: rgba(255,255,255,0.1); border-radius: 50%; }
      #shoot-btn { position: absolute; bottom: 60px; right: 60px; width: 100px; height: 100px; border-radius: 50%; background: red; border: 4px solid white; pointer-events: auto; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px red; }
      
      #skin-select { position: absolute; top: 10px; right: 10px; pointer-events: auto; }
      .skin-btn { padding: 8px; background: #222; color: #0f0; border: 1px solid #0f0; margin-bottom: 5px; font-size: 12px; display: block; width: 80px; }
      #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 12px; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="lobby">
      <h2 style="color:#00ffcc">P2P MULTIPLAYER</h2>
      <div style="background:#222; padding:15px; border-radius:10px; width:90%; text-align:center;">
        <p>ID ของคุณ (ส่งให้พี่ชาย):</p>
        <p id="my-id" style="font-size:24px; color:#ff4d4d; font-weight:bold;">กำลังสร้าง ID...</p>
      </div>
      <input type="text" id="peer-id-input" placeholder="วาง ID พี่ชายที่นี่">
      <button class="btn" style="background:#4d94ff" onclick="connectToPeer()">CONNECT TO PEER</button>
      <hr style="width:100%; margin:20px 0; opacity:0.2">
      <button class="btn" style="background:#ff4d4d" onclick="startSolo()">เล่นคนเดียว (Solo)</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="info">สถานะ: รอการเชื่อมต่อ...</div>
      <div id="skin-select">
        <button class="skin-btn" onclick="setSkin('jjs.png')">Skin 1</button>
        <button class="skin-btn" onclick="setSkin('jjkl.png')">Skin 2</button>
        <button class="skin-btn" onclick="setSkin('The Herta.png')">Skin 3</button>
        <button class="skin-btn" onclick="setSkin('Sparcy.png')">Skin 4</button>
      </div>
      <div id="joystick-zone"></div>
      <div id="shoot-btn">FIRE!!</div>
    </div>

    <a-scene>
      <a-assets>
        <a-asset-item id="gun" src="asd.glb"></a-asset-item>
        <a-asset-item id="city" src="city.glb"></a-asset-item>
        <img id="s1" src="jjs.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity gltf-model="#city" position="0 -1.5 -30" scale="0.1 0.1 0.1"></a-entity>
      <a-plane rotation="-90 0 0" width="1000" height="1000" color="#333"></a-plane>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="cam" camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled:false; touchEnabled:true;">
          <a-entity id="gun-model" gltf-model="#gun" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4"></a-entity>
          <a-entity cursor position="0 0 -1" geometry="primitive:ring; radiusInner:0.01; radiusOuter:0.015" material="color:lime; shader:flat"></a-entity>
        </a-entity>
        <a-image id="my-skin" src="#s1" width="2" height="2" position="0 1 0"></a-image>
      </a-entity>

      <a-entity id="other-player" visible="false">
        <a-sphere radius="0.2" position="0 2.2 0" color="blue"></a-sphere>
        <a-image id="other-skin" src="#s1" width="2" height="2" position="0 1 0"></a-image>
      </a-entity>
    </a-scene>

    <script>
      let peer, conn;
      const myIdDisplay = document.getElementById('my-id');
      const info = document.getElementById('info');
      const shootSound = new Audio("https://actions.google.com/sounds/v1/weapons/fire_arm_gunshot.ogg");

      // 1. เริ่มต้นระบบ Peer
      peer = new Peer();
      peer.on('open', id => myIdDisplay.innerText = id);

      // รับการเชื่อมต่อจากคนอื่น
      peer.on('connection', c => {
        conn = c;
        setupNetwork();
        startSolo(); 
        info.innerText = "สถานะ: พี่ชายเข้ามาแล้ว!";
      });

      function connectToPeer() {
        const peerId = document.getElementById('peer-id-input').value;
        conn = peer.connect(peerId);
        setupNetwork();
        startSolo();
        info.innerText = "สถานะ: เชื่อมต่อกับพี่ชายแล้ว!";
      }

      function setupNetwork() {
        conn.on('data', data => {
          if(data.type === 'move') {
            const other = document.getElementById('other-player');
            other.setAttribute('visible', 'true');
            other.setAttribute('position', data.pos);
            other.setAttribute('rotation', data.rot);
            if(data.skin) document.getElementById('other-skin').setAttribute('src', data.skin);
          }
        });
      }

      function startSolo() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        initJoystick();
        // ส่งตำแหน่งของเราให้พี่ชายทุกๆ 50ms
        setInterval(() => {
          if(conn && conn.open) {
            const rig = document.getElementById('rig');
            conn.send({
              type: 'move',
              pos: rig.getAttribute('position'),
              rot: rig.getAttribute('rotation'),
              skin: document.getElementById('my-skin').getAttribute('src')
            });
          }
        }, 50);
      }

      function setSkin(file) {
        document.getElementById('my-skin').setAttribute('src', file);
      }

      function initJoystick() {
        nipplejs.create({
          zone: document.getElementById('joystick-zone'),
          mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'white', size: 120
        }).on('move', (evt, data) => {
          const rig = document.getElementById('rig');
          const cam = document.getElementById('cam');
          const rotY = cam.getAttribute('rotation').y * Math.PI / 180;
          const pos = rig.getAttribute('position');
          const spd = 0.2;
          const fwd = Math.sin(data.angle.radian) * spd;
          const side = Math.cos(data.angle.radian) * spd;
          pos.x -= (Math.sin(rotY) * fwd + Math.cos(rotY) * side);
          pos.z -= (Math.cos(rotY) * fwd - Math.sin(rotY) * side);
          rig.setAttribute('position', pos);
        });
      }

      // ระบบยิง
      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        shootSound.currentTime = 0; shootSound.play();
        const gun = document.getElementById('gun-model');
        gun.setAttribute('position', '0.3 -0.4 -0.5');
        setTimeout(() => gun.setAttribute('position', '0.3 -0.4 -0.6'), 60);
      });

      // ล็อคหน้าจอไม่ให้มุดดิน
      setInterval(() => {
        const cam = document.getElementById('cam');
        const rot = cam.getAttribute('rotation');
        cam.setAttribute('rotation', {x: 0, y: rot.y, z: 0});
      }, 10);
    </script>
  </body>
        </html>
