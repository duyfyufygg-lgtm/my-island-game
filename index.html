<!DOCTYPE html>
<html>
<head>
    <title>The Herta Survival - FULL RESTORE</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js" } }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        
        /* UI พื้นฐาน */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .stats { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px black; }
        
        /* เอฟเฟคหน้าจอ (เอากลับมาแล้ว!) */
        #hacked-screen { position: absolute; width: 100%; height: 100%; background: rgba(150, 0, 255, 0.3); border: 15px solid purple; display: none; z-index: 90; animation: flash 0.3s infinite; pointer-events: none; }
        #stink-screen { position: absolute; width: 100%; height: 100%; background: rgba(0, 255, 0, 0.2); border: 20px solid #4b5320; display: none; z-index: 90; animation: shake 0.2s infinite; pointer-events: none; }
        @keyframes flash { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -2px); } 100% { transform: translate(2px, 2px); } }

        /* ระบบเมนู */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); color: white; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 10px; border: none; font-size: 18px; pointer-events: all; }
        
        /* ปุ่มควบคุม */
        #controls { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 500; }
        #joy { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; pointer-events: all; }
        .btn-atk { position: absolute; bottom: 40px; right: 40px; width: 110px; height: 110px; border-radius: 50%; background: red; color: white; border: 5px solid white; font-weight: bold; pointer-events: all; font-size: 20px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="hacked-screen"></div>
        <div id="stink-screen"></div>
        <div class="stats">
            <h1 id="hp-display">HP: --</h1>
            <h2 id="boss-hp-ui" style="color: #ff4444;">BOSS HP: --</h2>
            <p id="debuff-status" style="font-weight: bold; color: yellow;"></p>
        </div>
    </div>

    <div id="controls" class="hidden">
        <div id="joy"></div>
        <button id="atk-btn" class="btn-atk" onclick="attack()">ATK</button>
    </div>

    <div id="landing-page" class="overlay">
        <h1 style="color:#00ffcc; font-size: 50px;">THE HERTA GAME</h1>
        <button onclick="showRoles()">ENTER GAME</button>
    </div>

    <div id="role-page" class="overlay hidden">
        <h2>SELECT YOUR CHARACTER</h2>
        <button class="role-sel" onclick="selectRole('Speed', this)" style="background:#a349a4; color:white;">SPEED (Silver Wolf)</button>
        <button class="role-sel" onclick="selectRole('Atk', this)" style="background:#ed1c24; color:white;">ATK (T-Rex)</button>
        <button class="role-sel" onclick="selectRole('Tank', this)" style="background:#ff7f27; color:white;">TANK (ถังขยะ)</button>
        <button id="confirm-btn" class="hidden" style="background:#00ffcc; color:black;" onclick="confirmJoin()">START JOURNEY</button>
    </div>

    <a-scene>
        <a-assets>
            <a-asset-item id="city-m" src="city.glb"></a-asset-item>
            <a-asset-item id="trex-m" src="T-Rex.glb"></a-asset-item>
            <a-asset-item id="bin-m" src="bin.glb"></a-asset-item>
            <a-asset-item id="fae-m" src="fae.glb"></a-asset-item>
            <a-asset-item id="hand-m" src="asd.glb"></a-asset-item>
            <img id="sky-img" src="the.png">
            <img id="boss-img" src="67.png">
        </a-assets>

        <a-sky src="#sky-img"></a-sky>
        <a-entity gltf-model="#city-m" position="0 -1 0"></a-entity>

        <a-entity id="camera-rig" position="0 1.6 0">
            <a-camera id="cam" look-controls="pointerLockEnabled: false">
                <a-entity id="my-hand" gltf-model="#hand-m" position="0.3 -0.4 -0.5" rotation="0 180 0" visible="false"></a-entity>
                <a-cursor color="cyan"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="players-container"></a-entity>
        
        <a-entity id="boss-entity" position="0 0 -15">
            <a-entity gltf-model="#bin-m" scale="6 6 6"></a-entity>
            <a-image src="#boss-img" position="0 7 0" scale="4 4 4"></a-image>
            <a-text value="GIANT STINKY BOSS" align="center" position="0 10 0" scale="4 4 4" color="red"></a-text>
        </a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update, onDisconnect, get } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://duyfyufygg-lgtm.github.io/my-island-game/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = "UID-" + Math.floor(Math.random() * 9999);
        let myRole = "";
        let moveData = { x: 0, z: 0 };
        const BOSS_ID = "WORLD_BOSS_01";

        window.showRoles = () => {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('role-page').classList.remove('hidden');
        };

        window.selectRole = (role, btn) => {
            window.selectedRole = role;
            document.querySelectorAll('.role-sel').forEach(b => b.style.outline = "none");
            btn.style.outline = "4px solid #00ffcc";
            document.getElementById('confirm-btn').classList.remove('hidden');
        };

        window.confirmJoin = () => {
            myRole = window.selectedRole;
            document.getElementById('role-page').remove();
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('my-hand').setAttribute('visible', 'true');

            set(ref(db, 'server_final/' + myId), {
                id: myId, role: myRole, x: 0, z: 0, hp: (myRole === 'Tank' ? 400 : 100), ry: 0,
                model: (myRole === 'Tank' ? '#bin-m' : (myRole === 'Atk' ? '#trex-m' : '#fae-m')),
                hacked: 0, stinking: 0
            });
            onDisconnect(ref(db, 'server_final/' + myId)).remove();

            get(ref(db, 'server_final/' + BOSS_ID)).then(s => {
                if(!s.exists()) set(ref(db, 'server_final/' + BOSS_ID), { id: BOSS_ID, role: "BOSS", x: 0, z: -15, hp: 3000 });
            });
            initJoystick();
        };

        // --- ระบบ Damage Over Time (DOT) ห้ามถอด! ---
        setInterval(() => {
            if (!myRole) return;
            get(ref(db, 'server_final/' + myId)).then(s => {
                if (!s.exists()) return;
                let data = s.val();
                let newHp = data.hp;
                let updates = {};

                if (data.hacked > 0) { newHp -= 12; updates.hacked = data.hacked - 1; }
                if (data.stinking > 0) { newHp -= 3; updates.stinking = data.stinking - 1; }

                if (newHp !== data.hp || Object.keys(updates).length > 0) {
                    updates.hp = newHp;
                    update(ref(db, 'server_final/' + myId), updates);
                }
            });
        }, 1000);

        // --- Boss AI Attack ---
        setInterval(() => {
            if (!myRole) return;
            const rig = document.getElementById('camera-rig').object3D.position;
            get(ref(db, 'server_final/' + BOSS_ID)).then(s => {
                if (s.exists() && s.val().hp > 0) {
                    const boss = s.val();
                    let dist = Math.sqrt(Math.pow(rig.x - boss.x, 2) + Math.pow(rig.z - boss.z, 2));
                    if (dist < 10) {
                        get(ref(db, 'server_final/' + myId)).then(me => {
                            if(me.exists()) update(ref(db, 'server_final/' + myId), { hp: me.val().hp - 5, stinking: 5 });
                        });
                    }
                }
            });
        }, 1000);

        onValue(ref(db, 'server_final'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            if (data[myId]) {
                const me = data[myId];
                document.getElementById('hp-display').innerText = "HP: " + me.hp;
                document.getElementById('hacked-screen').style.display = me.hacked > 0 ? 'block' : 'none';
                document.getElementById('stink-screen').style.display = me.stinking > 0 ? 'block' : 'none';
                document.getElementById('debuff-status').innerText = (me.hacked > 0 ? "⚠️ HACKED " : "") + (me.stinking > 0 ? "🤢 STINKY" : "");
                if (me.hp <= 0) { alert("GAME OVER!"); location.reload(); }
            }
            if (data[BOSS_ID]) {
                document.getElementById('boss-hp-ui').innerText = "BOSS HP: " + data[BOSS_ID].hp;
                if(data[BOSS_ID].hp <= 0) document.getElementById('boss-entity').setAttribute('visible', 'false');
            }
        });

        window.attack = () => {
            document.getElementById('my-hand').setAttribute('animation', "property: position; to: 0.3 -0.4 -0.9; dur: 100; dir: alternate; loop: 2");
            const inter = document.querySelector('a-cursor').components.raycaster.intersections[0];
            if (inter && inter.object.el) {
                const tid = inter.object.el.id || BOSS_ID;
                get(ref(db, `server_final/${tid}`)).then(s => {
                    if (s.exists()) {
                        let up = { hp: s.val().hp - (myRole === 'Atk' ? 20 : 5) };
                        if (myRole === 'Speed') up.hacked = 10;
                        if (myRole === 'Tank') up.stinking = 10;
                        update(ref(db, `server_final/${tid}`), up);
                    }
                });
            }
        };

        function initJoystick() {
            const manager = nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: { left: '75px', bottom: '75px' } });
            manager.on('move', (e, d) => { moveData.x = Math.cos(d.angle.radian) * d.force * 0.22; moveData.z = -Math.sin(d.angle.radian) * d.force * 0.22; });
            manager.on('end', () => moveData = { x: 0, z: 0 });
        }

        setInterval(() => {
            if (!myRole) return;
            const rig = document.getElementById('camera-rig');
            const cam = document.getElementById('cam');
            let ry = cam.getAttribute('rotation').y * (Math.PI / 180);
            rig.object3D.position.x += moveData.x * Math.cos(ry) + moveData.z * Math.sin(ry);
            rig.object3D.position.z += -moveData.x * Math.sin(ry) + moveData.z * Math.cos(ry);
            update(ref(db, 'server_final/' + myId), { x: rig.object3D.position.x, z: rig.object3D.position.z, ry: cam.getAttribute('rotation').y });
        }, 30);
    </script>
</body>
    </html>
