<!DOCTYPE html>
<html>
<head>
    <title>The Herta Survival - Boss Revenge</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js" } }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; color: white; text-shadow: 2px 2px black; pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; background: rgba(0,0,0,0.85); color: white; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 10px; border: none; font-size: 18px; }
        #confirm-btn { background: #00ffcc; color: black; box-shadow: 0 0 15px #00ffcc; }
        
        /* เอฟเฟคจอ */
        #stink-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 255, 0, 0.2); border: 20px solid #4b5320; display: none; pointer-events: none; z-index: 140; animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -2px); } 100% { transform: translate(2px, 2px); } }
        
        .btn-atk { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; border-radius: 50%; background: red; color: white; z-index: 100; border: 5px solid white; font-weight: bold; }
        #joy { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="hp-display">HP: --</h1>
        <h2 id="boss-hp-ui" style="color: #ff4444;">BOSS HP: --</h2>
    </div>

    <div id="stink-screen"></div>

    <div id="landing-page" class="overlay">
        <h1 style="color:#00ffcc; font-size: 40px;">THE HERTA GAME</h1>
        <button onclick="showRoles()" style="background:#00ffcc; color:black;">ENTER GAME</button>
    </div>

    <div id="role-page" class="overlay hidden">
        <h2>SELECT CHARACTER</h2>
        <button onclick="selectRole('Speed', this)" style="background:#a349a4; color:white;">SPEED (Silver Wolf)</button>
        <button onclick="selectRole('Atk', this)" style="background:#ed1c24; color:white;">ATK (T-Rex)</button>
        <button onclick="selectRole('Tank', this)" style="background:#ff7f27; color:white;">TANK (ถังขยะ)</button>
        <button id="confirm-btn" class="hidden" onclick="confirmJoin()">START GAME</button>
    </div>

    <div id="joy"></div>
    <button id="atk-btn" class="btn-atk hidden" onclick="attack()">ATK</button>
    
    <a-scene>
        <a-assets>
            <a-asset-item id="city-m" src="city.glb"></a-asset-item>
            <a-asset-item id="trex-m" src="T-Rex.glb"></a-asset-item>
            <a-asset-item id="bin-m" src="bin.glb"></a-asset-item>
            <a-asset-item id="fae-m" src="fae.glb"></a-asset-item>
            <a-asset-item id="hand-m" src="asd.glb"></a-asset-item>
            <img id="sky-img" src="the.png">
            <img id="boss-img" src="67.png">
        </a-assets>

        <a-sky src="#sky-img"></a-sky>
        <a-entity gltf-model="#city-m" position="0 -1 0"></a-entity>

        <a-entity id="camera-rig" position="0 1.6 0">
            <a-camera id="cam" look-controls="pointerLockEnabled: false">
                <a-entity id="my-hand" gltf-model="#hand-m" position="0.3 -0.4 -0.5" rotation="0 180 0" visible="false"></a-entity>
                <a-cursor color="cyan"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="players-container"></a-entity>
        
        <a-entity id="boss-entity" position="0 0 -15">
            <a-entity gltf-model="#bin-m" scale="6 6 6" animation-mixer></a-entity>
            <a-image src="#boss-img" position="0 7 0" scale="4 4 4" look-at="#cam"></a-image>
            <a-text id="boss-label" value="GIANT BOSS" align="center" position="0 10 0" scale="5 5 5" color="red"></a-text>
        </a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update, onDisconnect, get } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://duyfyufygg-lgtm.github.io/my-island-game/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = "UID-" + Math.floor(Math.random() * 9999);
        let myRole = "";
        let moveData = { x: 0, z: 0 };
        const BOSS_ID = "WORLD_BOSS_01";

        window.showRoles = () => {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('role-page').classList.remove('hidden');
        };

        window.selectRole = (role, btn) => {
            window.selectedRole = role;
            document.querySelectorAll('button').forEach(b => b.style.border = "none");
            btn.style.border = "4px solid #00ffcc";
            document.getElementById('confirm-btn').classList.remove('hidden');
        };

        window.confirmJoin = () => {
            myRole = window.selectedRole;
            document.getElementById('role-page').classList.add('hidden');
            document.getElementById('atk-btn').classList.remove('hidden');
            document.getElementById('my-hand').setAttribute('visible', 'true');

            // เข้าเกม + เช็กว่ามีบอสในเซิร์ฟเวอร์หรือยัง ถ้าไม่มีให้สร้าง
            set(ref(db, 'server_boss/' + myId), {
                id: myId, role: myRole, x: 0, z: 0, hp: (myRole === 'Tank' ? 350 : 100), ry: 0,
                model: (myRole === 'Tank' ? '#bin-m' : (myRole === 'Atk' ? '#trex-m' : '#fae-m')),
                stinking: 0
            });
            onDisconnect(ref(db, 'server_boss/' + myId)).remove();

            // สร้างบอส (เลือด 3,000 พอ ไม่เยอะเกินไปตามสั่ง)
            get(ref(db, 'server_boss/' + BOSS_ID)).then(s => {
                if(!s.exists()) {
                    set(ref(db, 'server_boss/' + BOSS_ID), { id: BOSS_ID, role: "BOSS", x: 0, z: -15, hp: 3000 });
                }
            });
        };

        // ระบบบอสโจมตี (AI เช็กระยะ)
        setInterval(() => {
            if (!myRole) return;
            const rig = document.getElementById('camera-rig').object3D.position;
            get(ref(db, 'server_boss/' + BOSS_ID)).then(s => {
                if(!s.exists()) return;
                const boss = s.val();
                if (boss.hp <= 0) return;

                // คำนวณระยะห่างระหว่างเรากับบอส
                let dist = Math.sqrt(Math.pow(rig.x - boss.x, 2) + Math.pow(rig.z - boss.z, 2));
                
                // ถ้าใกล้บอสเกิน (ระยะ 8 หน่วย) บอสจะตบเรา!
                if (dist < 8) {
                    get(ref(db, 'server_boss/' + myId)).then(meS => {
                        if(meS.exists()){
                            update(ref(db, 'server_boss/' + myId), { 
                                hp: meS.val().hp - 5, // บอสทำดาเมจ 5 ทุกวินาที
                                stinking: 5 // ติดสถานะเหม็น 5 วิ
                            });
                        }
                    });
                }
            });
        }, 1000);

        // Sync ข้อมูล
        onValue(ref(db, 'server_boss'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data[myId]) {
                const me = data[myId];
                document.getElementById('hp-display').innerText = "HP: " + me.hp;
                document.getElementById('stink-screen').style.display = me.stinking > 0 ? 'block' : 'none';
                if (me.hp <= 0) location.reload();
            }

            if (data[BOSS_ID]) {
                const boss = data[BOSS_ID];
                document.getElementById('boss-hp-ui').innerText = "BOSS HP: " + boss.hp;
                const bEl = document.getElementById('boss-entity');
                bEl.setAttribute('position', `${boss.x} 0 ${boss.z}`);
                if(boss.hp <= 0) bEl.setAttribute('visible', 'false');
            }
        });

        window.attack = () => {
            document.getElementById('my-hand').setAttribute('animation', "property: position; to: 0.3 -0.4 -0.9; dur: 100; dir: alternate; loop: 2");
            const inter = document.querySelector('a-cursor').components.raycaster.intersections[0];
            
            // ตีบอสหรือตีผู้เล่น
            if (inter && inter.object.el) {
                const tid = inter.object.el.id || BOSS_ID; // ถ้าไม่มี ID ให้ถือว่าตีโดนตัวบอส
                get(ref(db, `server_boss/${tid}`)).then(s => {
                    if (s.exists()) {
                        update(ref(db, `server_boss/${tid}`), { hp: s.val().hp - (myRole === 'Atk' ? 25 : 10) });
                    }
                });
            }
        };

        // Movement [เหมือนเดิม]
        const manager = nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: { left: '70px', bottom: '70px' } });
        manager.on('move', (e, d) => { moveData.x = Math.cos(d.angle.radian) * d.force * 0.2; moveData.z = -Math.sin(d.angle.radian) * d.force * 0.2; });
        manager.on('end', () => moveData = { x: 0, z: 0 });
        setInterval(() => {
            if (!myRole) return;
            const rig = document.getElementById('camera-rig');
            const cam = document.getElementById('cam');
            let ry = cam.getAttribute('rotation').y * (Math.PI / 180);
            rig.object3D.position.x += moveData.x * Math.cos(ry) + moveData.z * Math.sin(ry);
            rig.object3D.position.z += -moveData.x * Math.sin(ry) + moveData.z * Math.cos(ry);
            update(ref(db, 'server_boss/' + myId), { x: rig.object3D.position.x, z: rig.object3D.position.z, ry: cam.getAttribute('rotation').y });
        }, 30);
    </script>
</body>
    </html>
