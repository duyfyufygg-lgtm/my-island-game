<!DOCTYPE html>
<html>
  <head>
    <title>Island Survival - SKIN & FPS FIXED</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script src="https://unpkg.com/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="https://unpkg.com/networked-aframe@0.12.0/dist/networked-aframe.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
      #main-menu { position: fixed; inset: 0; background: #111; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
      .team-btn { padding: 20px 40px; font-size: 24px; margin: 10px; border-radius: 15px; border: none; cursor: pointer; width: 250px; font-weight: bold; }
      
      #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; pointer-events: auto; background: rgba(255,255,255,0.15); border-radius: 50%; }
      #shoot-btn { position: absolute; bottom: 60px; right: 60px; width: 110px; height: 110px; border-radius: 50%; background: #ff0000; border: 5px solid white; pointer-events: auto; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; box-shadow: 0 0 20px red; }
      
      #skin-control { position: absolute; top: 20px; right: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 5px; }
      .skin-btn { padding: 10px; background: rgba(0,0,0,0.7); color: #00ffcc; border: 1px solid #00ffcc; border-radius: 5px; cursor: pointer; }
      
      #hud { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 24px; text-shadow: 2px 2px #000; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="main-menu">
      <h1 style="color:#00ffcc">TEAM BATTLE ONLINE</h1>
      <button class="team-btn" style="background:#ff4d4d" onclick="startGame('red')">เข้าร่วมทีมแดง</button>
      <button class="team-btn" style="background:#4d94ff" onclick="startGame('blue')">เข้าร่วมทีมน้ำเงิน</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="hud">
        <div id="timer">05:00</div>
        <div id="score">RED: 0 | BLUE: 0</div>
      </div>

      <div id="skin-control">
        <button class="skin-btn" onclick="changeSkin('jjs.png')">Skin 1</button>
        <button class="skin-btn" onclick="changeSkin('jjkl.png')">Skin 2</button>
        <button class="skin-btn" onclick="changeSkin('The Herta.png')">Skin 3</button>
        <button class="skin-btn" onclick="changeSkin('Sparcy.png')">Skin 4</button>
      </div>

      <div id="joystick-zone"></div>
      <div id="shoot-btn">ยิง!!</div>
    </div>

    <a-scene networked-scene="serverURL: https://naf-examples.glitch.me/; app: final_skin_war; room: global; adapter: socketio;">
      <a-assets>
        <a-asset-item id="gun" src="asd.glb"></a-asset-item>
        <a-asset-item id="city" src="city.glb"></a-asset-item>
        <img id="skin1" src="jjs.png">
        <img id="skin2" src="jjkl.png">
        <img id="skin3" src="The Herta.png">
        <img id="skin4" src="Sparcy.png">

        <template id="player-template">
          <a-entity class="player-avatar">
            <a-sphere class="team-marker" radius="0.25" position="0 2.3 0"></a-sphere>
            <a-image class="avatar-image" src="#skin1" width="2" height="2" position="0 1 0"></a-image>
          </a-entity>
        </template>
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity gltf-model="#city" position="0 -1.5 -30" scale="0.1 0.1 0.1"></a-entity>
      <a-plane rotation="-90 0 0" width="1000" height="1000" color="#222"></a-plane>

      <a-entity id="rig" position="0 0 0" networked="template: #player-template; attachTemplateToLocal: false;">
        <a-entity id="cam" camera position="0 1.6 0" look-controls="magicWindowTrackingEnabled: false; touchEnabled: true;">
          <a-entity id="gun-model" gltf-model="#gun" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4"></a-entity>
          <a-entity id="cursor" cursor position="0 0 -1" 
                    geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.012" 
                    material="color: #00ff00; shader: flat" 
                    raycaster="objects: .player-avatar; far: 100">
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let myTeam = '';
      const shootSound = new Audio("https://actions.google.com/sounds/v1/weapons/fire_arm_gunshot.ogg");

      // ส่งข้อมูลสกินข้ามเครือข่าย
      if (typeof NAF !== 'undefined') {
        NAF.schemas.add({
          template: '#player-template',
          components: ['position', 'rotation', { selector: '.team-marker', component: 'material.color' }, { selector: '.avatar-image', component: 'src' }]
        });
      }

      function startGame(team) {
        myTeam = team;
        shootSound.play().then(() => { shootSound.pause(); shootSound.currentTime = 0; });
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        
        const marker = document.querySelector('#rig .team-marker');
        if(marker) marker.setAttribute('material', 'color', team);

        initJoystick();
      }

      function changeSkin(file) {
        const myAvatar = document.querySelector('#rig .avatar-image');
        if(myAvatar) myAvatar.setAttribute('src', file);
      }

      function initJoystick() {
        nipplejs.create({
          zone: document.getElementById('joystick-zone'),
          mode: 'static',
          position: { left: '75px', bottom: '75px' },
          color: 'white',
          size: 120
        }).on('move', (evt, data) => {
          const rig = document.getElementById('rig');
          const cam = document.getElementById('cam');
          const rot = cam.getAttribute('rotation').y * Math.PI / 180;
          const pos = rig.getAttribute('position');
          const speed = 0.2;
          const f = Math.sin(data.angle.radian) * speed;
          const s = Math.cos(data.angle.radian) * speed;
          pos.x -= (Math.sin(rot) * f + Math.cos(rot) * s);
          pos.z -= (Math.cos(rot) * f - Math.sin(rot) * s);
          rig.setAttribute('position', pos);
        });
      }

      // ระบบยิง
      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        shootSound.currentTime = 0;
        shootSound.play();

        const gun = document.getElementById('gun-model');
        gun.setAttribute('position', '0.3 -0.4 -0.5');
        setTimeout(() => gun.setAttribute('position', '0.3 -0.4 -0.6'), 60);

        const ray = document.getElementById('cursor').components.raycaster;
        if (ray.intersections.length > 0) {
          const target = ray.intersections[0].object.el;
          const netId = NAF.utils.getNetworkId(target);
          if (netId) NAF.connection.broadcastData('hit', { id: netId, fromTeam: myTeam });
        }
      });

      // ล็อคหน้าจอไม่ให้ก้มเงย (FPS Fix)
      setInterval(() => {
        const cam = document.getElementById('cam');
        const rot = cam.getAttribute('rotation');
        cam.setAttribute('rotation', {x: 0, y: rot.y, z: 0});
      }, 10);
    </script>
  </body>
</html>
