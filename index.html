<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Island Survival v3.4.3 - Possession Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
      #stink-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, rgba(100,255,0,0) 30%, rgba(50,100,0,0.6) 100%); pointer-events:none; z-index:2000; display:none; animation: pulse 1.5s infinite alternate; }
      #hack-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(0deg, rgba(150,0,255,0.15) 0px, rgba(150,0,255,0.15) 2px, transparent 3px); pointer-events:none; z-index:2001; display:none; animation: glitch 0.2s infinite; }
      #possession-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.2); border: 10px double red; pointer-events:none; z-index:2002; display:none; color: white; text-align: center; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #000; }
      @keyframes pulse { from {opacity: 0.4;} to {opacity: 0.8;} }
      @keyframes glitch { 0% {transform: translate(0);} 50% {transform: translate(3px,-2px);} 100% {transform: translate(0);} }

      #lobby-screen { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#111; z-index:4000; color:white; }
      .room-list { width: 85%; height: 180px; overflow-y: auto; background: #222; margin: 15px; border-radius: 10px; padding: 10px; border: 1px solid #444; }
      .room-item { background: #333; margin: 8px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
      
      #admin-door { position: absolute; bottom: 0; right: 0; width: 40px; height: 40px; opacity: 0.1; z-index: 5000; cursor: pointer; background: red; }
      #admin-panel { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 6000; display:none; flex-direction: column; justify-content: center; align-items: center; color: white; overflow-y: auto; }

      #main-menu, #tank-menu { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#111; z-index:1000; color:white; text-align: center; }
      .skin-container { display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; justify-content:center; max-width: 90%; }
      .skin-btn { width:60px; height:60px; border:2px solid #fff; border-radius:10px; cursor:pointer; overflow:hidden; }
      .skin-btn.active { border-color:#00ffcc; box-shadow: 0 0 10px #00ffcc; }
      .role-btn { padding:12px; margin:5px; width:220px; border-radius:10px; border:2px solid #fff; background:none; color:#fff; font-weight:bold; cursor:pointer; }
      
      #ui-layer { position:absolute; top:15px; left:15px; z-index:999; color:#fff; pointer-events:none; }
      #controls-ui { position:absolute; bottom:0; left:0; width:100%; height:100%; z-index:998; pointer-events:none; }
      #joystick-zone { position:absolute; bottom:40px; left:40px; width:120px; height:120px; pointer-events:auto; }
      .fire-btn { position:absolute; bottom:50px; right:40px; width:90px; height:90px; border-radius:50%; background:#ff4444; color:white; border:4px solid #fff; pointer-events:auto; display:flex; align-items:center; justify-content:center; font-weight:bold; }
      .hidden { display:none !important; }
    </style>
  </head>
  <body>

    <div id="stink-overlay"></div>
    <div id="hack-overlay"></div>
    <div id="possession-overlay">YOU ARE POSSESSED!</div>

    <div id="lobby-screen">
      <h2 style="color: #00ffcc;">SELECT SERVER</h2>
      <div class="room-list" id="room-list-ui">Searching...</div>
      <button class="role-btn" onclick="createRoom()" style="background:#00ffcc; color:black; border:none;">CREATE NEW ROOM</button>
      <div id="admin-door" onclick="showAdminLogin()"></div>
    </div>

    <div id="admin-panel">
      <h2 style="color:red;">ADMIN OVERRIDE</h2>
      <input type="password" id="admin-pass" placeholder="Password" style="padding:10px; margin-bottom:10px;">
      <button class="role-btn" onclick="checkAdmin()">LOGIN</button>
      
      <div id="admin-tools" style="display:none; text-align:center;">
          <button class="role-btn" id="btn-inviz" onclick="toggleInvisible()">1. ล่องหน (OFF)</button>
          <button class="role-btn" onclick="massEffect('hacked')">2. แฮกยกห้อง</button>
          <button class="role-btn" onclick="massEffect('stink')">3. เหม็นยกห้อง</button>
          <button class="role-btn" id="btn-posses" style="background:#f1c40f; color:black;" onclick="togglePossession()">4. สกิลสิงร่าง (OFF)</button>
          <button class="role-btn" style="background:red;" onclick="adminKillAll()">RESET ROOM</button>
      </div>
      <button class="role-btn" onclick="document.getElementById('admin-panel').style.display='none'">CLOSE</button>
    </div>

    <div id="main-menu" class="hidden">
      <h1 style="color: #00ffcc;">เกาะมหาสนุก v3.4.3</h1>
      <div class="skin-container">
        <div class="skin-btn active" onclick="selectSkin('#imgRed', this)"><img src="jjs.png" width="100%"></div>
        <div class="skin-btn" onclick="selectSkin('#imgBlue', this)"><img src="jjkl.png" width="100%"></div>
        <div class="skin-btn" onclick="selectSkin('#imgHerta', this)"><img src="The Herta.png" width="100%"></div>
        <div class="skin-btn" onclick="selectSkin('#imgSparcy', this)"><img src="Sparcy.png" width="100%"></div>
        <div class="skin-btn" onclick="selectSkin('#img67', this)"><img src="67.png" width="100%"></div>
      </div>
      <button class="role-btn" onclick="startGame('P1')">มือปืน</button>
      <button class="role-btn" onclick="startGame('P2')">มือขวาน</button>
      <button class="role-btn" style="background:#ff9900; color:black; border:none;" onclick="openTankMenu()">สายแทงค์</button>
    </div>

    <div id="tank-menu" class="hidden">
      <h2>SELECT TANK SKIN</h2>
      <div class="skin-container">
        <div class="tank-option-btn" onclick="selectTankSubSkin('rex', '#tankModel', this)">T-Rex</div>
        <div class="tank-option-btn" onclick="selectTankSubSkin('bin', '#binModel', this)">ถังขยะ</div>
        <div class="tank-option-btn" onclick="selectTankSubSkin('sw', '#faeModel', this)">S.Wolf</div>
      </div>
      <button class="tank-select-btn" onclick="startGame('P3')">ยืนยัน</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="my-name-display" style="color: gold; font-weight: bold;"></div>
      <div>HP: <span id="hp-text">100</span></div>
      <div id="room-id-display" style="font-size:10px;">Room: --</div>
    </div>

    <div id="controls-ui" class="hidden">
      <div id="joystick-zone"></div>
      <div id="shoot-btn" class="fire-btn">โจมตี!</div>
    </div>

    <a-scene>
      <a-assets timeout="20000">
        <a-asset-item id="gunModel" src="asd.glb"></a-asset-item>
        <a-asset-item id="axeModel" src="fps.glb"></a-asset-item> 
        <a-asset-item id="islandModel" src="city.glb"></a-asset-item>
        <a-asset-item id="tankModel" src="T-Rex.glb"></a-asset-item>
        <a-asset-item id="binModel" src="bin.glb"></a-asset-item>
        <a-asset-item id="faeModel" src="Fae.glb"></a-asset-item>
        <img id="imgRed" src="jjs.png"><img id="imgBlue" src="jjkl.png">
        <img id="imgHerta" src="The Herta.png"><img id="imgSparcy" src="Sparcy.png"><img id="img67" src="67.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity id="island" gltf-model="#islandModel" position="0 -1.5 -25" scale="0.1 0.1 0.1"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0">
          <a-entity id="weapon-P1" gltf-model="#gunModel" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4" visible="false"></a-entity>
          <a-entity id="weapon-P2" gltf-model="#axeModel" position="0.2 -0.6 -0.8" scale="1.2 1.2 1.2" rotation="0 180 0" visible="false"></a-entity>
          <a-entity id="weapon-P3" gltf-model="#gunModel" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4" visible="false"></a-entity>
        </a-entity>
        <a-image id="my-skin-display" width="4" height="4" position="0 2 0"></a-image>
        <a-entity id="my-tank-model" scale="1.5 1.5 1.5" position="0 -1.5 0" rotation="0 180 0" visible="false" animation-mixer></a-entity>
      </a-entity>

      <a-entity id="player-P1" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P1" opacity="0" width="4" height="5"></a-box></a-entity>
      <a-entity id="player-P2" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P2" opacity="0" width="4" height="5"></a-box></a-entity>
      <a-entity id="player-P3" visible="false"><a-entity id="player-P3-model" scale="1.5 1.5 1.5" position="0 -1.5 0"></a-entity><a-box class="targetable" data-id="P3" opacity="0" width="5" height="6"></a-box></a-entity>
    </a-scene>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = { databaseURL: "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/" };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let health = 100, myRole = "", mySkin = "#imgRed", moveSpeed = 0.3;
      let selectedTankModel = "#tankModel", isStinking = false, isHacked = false;
      let currentRoom = "", isInvisible = false, isPossessing = false, possessedTarget = null;

      // Lobby System
      onValue(ref(db, 'rooms'), s => {
        const rooms = s.val(); const ui = document.getElementById('room-list-ui'); ui.innerHTML = "";
        if(!rooms) return;
        for(let rId in rooms) {
          let count = Object.keys(rooms[rId].players || {}).length;
          if(count < 10) {
            let div = document.createElement('div'); div.className="room-item";
            div.innerHTML = `<span>${rId} (${count}/10)</span> <button onclick="joinRoom('${rId}')">JOIN</button>`;
            ui.appendChild(div);
          }
        }
      });
      window.createRoom = () => joinRoom("R_" + Math.floor(Math.random()*999));
      window.joinRoom = rId => { currentRoom = rId; document.getElementById('lobby-screen').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); document.getElementById('room-id-display').innerText = "Room: " + rId; };

      // Admin Controls
      window.showAdminLogin = () => document.getElementById('admin-panel').style.display='flex';
      window.checkAdmin = () => { if(document.getElementById('admin-pass').value === 'the-herta-game') document.getElementById('admin-tools').style.display='block'; };
      
      window.toggleInvisible = () => {
        isInvisible = !isInvisible;
        document.getElementById('btn-inviz').innerText = `1. ล่องหน (${isInvisible ? 'ON' : 'OFF'})`;
        if(isInvisible) remove(ref(db, `rooms/${currentRoom}/players/${myRole}`));
      };

      window.massEffect = t => {
        get(ref(db, `rooms/${currentRoom}/players`)).then(s => {
          const p = s.val(); for(let id in p) if(id !== myRole) update(ref(db, `rooms/${currentRoom}/players/${id}`), {[t]: true});
        });
      };

      window.togglePossession = () => {
        isPossessing = !isPossessing;
        const btn = document.getElementById('btn-posses');
        if(isPossessing) {
          get(ref(db, `rooms/${currentRoom}/players`)).then(s => {
            const players = s.val();
            const targets = Object.keys(players).filter(id => id !== myRole);
            if(targets.length > 0) {
              possessedTarget = targets[Math.floor(Math.random()*targets.length)];
              update(ref(db, `rooms/${currentRoom}/players/${possessedTarget}`), { possessedBy: myRole });
              btn.innerText = `4. สิงร่าง (${possessedTarget})`;
            } else { isPossessing = false; alert("ไม่มีเป้าหมาย!"); }
          });
        } else {
          if(possessedTarget) update(ref(db, `rooms/${currentRoom}/players/${possessedTarget}`), { possessedBy: null });
          possessedTarget = null; btn.innerText = "4. สกิลสิงร่าง (OFF)";
        }
      };

      window.adminKillAll = () => remove(ref(db, `rooms/${currentRoom}/players`));

      // Game Logic
      window.selectSkin = (s, b) => { mySkin = s; document.querySelectorAll('.skin-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); };
      window.openTankMenu = () => document.getElementById('tank-menu').classList.remove('hidden');
      window.selectTankSubSkin = (n, m, b) => { selectedTankModel = m; document.querySelectorAll('.tank-option-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };

      window.startGame = function(role) {
        myRole = role; document.getElementById('main-menu').classList.add('hidden'); document.getElementById('tank-menu').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden'); document.getElementById('controls-ui').classList.remove('hidden');

        if(role === 'P3') { health = 300; moveSpeed = 0.4; document.getElementById('my-tank-model').setAttribute('gltf-model', selectedTankModel); document.getElementById('my-tank-model').setAttribute('visible', true); document.getElementById('my-skin-display').setAttribute('visible', false); }
        else { moveSpeed = (role === 'P2' ? 0.6 : 0.3); document.getElementById('my-skin-display').setAttribute('src', mySkin); }
        document.getElementById('weapon-' + role).setAttribute('visible', true);

        const myRef = ref(db, `rooms/${currentRoom}/players/${myRole}`);
        onDisconnect(myRef).remove();

        setInterval(() => {
          if(!isInvisible) {
            let pos = document.getElementById('rig').getAttribute('position');
            let rot = document.getElementById('camera').getAttribute('rotation');
            update(myRef, { p: pos, r: rot, hp: health, skin: (role==='P3'?'TANK':mySkin), tankType: (role==='P3'?selectedTankModel:'') });
            // ถ้ากำลังสิงร่าง ให้เป้าหมายเคลื่อนที่ตามเรา
            if(isPossessing && possessedTarget) {
              update(ref(db, `rooms/${currentRoom}/players/${possessedTarget}`), { p: {x: pos.x, y: pos.y, z: pos.z - 2}, r: rot });
            }
          }
        }, 50);

        onValue(ref(db, `rooms/${currentRoom}/players`), snap => {
          const players = snap.val() || {};
          ['P1','P2','P3'].forEach(id => {
            const ent = document.getElementById('player-' + id);
            if(id === myRole) {
              health = players[id]?.hp ?? health;
              document.getElementById('hp-text').innerText = Math.max(0, Math.floor(health));
              if(players[id]?.stink && !isStinking) applyEffect('stink');
              if(players[id]?.hacked && !isHacked) applyEffect('hacked');
              // ตรวจสอบว่าโดนสิงหรือไม่
              const pOverlay = document.getElementById('possession-overlay');
              if(players[id]?.possessedBy) {
                pOverlay.style.display = 'flex';
                document.getElementById('rig').setAttribute('position', players[id].p);
                document.getElementById('camera').setAttribute('rotation', players[id].r);
              } else { pOverlay.style.display = 'none'; }
            } else if(players[id]) {
              ent.setAttribute('visible', players[id].hp > 0);
              ent.setAttribute('position', players[id].p);
              ent.setAttribute('rotation', {x:0, y:players[id].r.y, z:0});
              if(players[id].skin === 'TANK') {
                const m = ent.querySelector('#player-P3-model');
                if(m.getAttribute('gltf-model') !== players[id].tankType) m.setAttribute('gltf-model', players[id].tankType);
              } else { ent.querySelector('a-image').setAttribute('src', players[id].skin); }
            } else { ent.setAttribute('visible', false); }
          });
        });
        initJoystick();
      }

      function applyEffect(type) {
        if(type === 'stink') { isStinking = true; document.getElementById('stink-overlay').style.display='block'; }
        if(type === 'hacked') { isHacked = true; document.getElementById('hack-overlay').style.display='block'; }
        setTimeout(() => {
          if(type === 'stink') { isStinking = false; document.getElementById('stink-overlay').style.display='none'; }
          if(type === 'hacked') { isHacked = false; document.getElementById('hack-overlay').style.display='none'; }
          update(ref(db, `rooms/${currentRoom}/players/${myRole}`), {[type]: false});
        }, 5000);
      }

      document.getElementById('shoot-btn').addEventListener('touchstart', () => {
        const cam = document.getElementById('camera'), ray = new THREE.Raycaster();
        const p = new THREE.Vector3(), q = new THREE.Quaternion(), d = new THREE.Vector3(0,0,-1);
        cam.object3D.getWorldPosition(p); cam.object3D.getWorldQuaternion(q);
        d.applyQuaternion(q); ray.set(p, d); ray.far = 15;
        const hits = ray.intersectObjects(Array.from(document.querySelectorAll('.targetable')).map(t => t.getObject3D('mesh')).filter(m => m));
        if (hits.length > 0) {
          const tid = hits[0].object.el.dataset.id;
          get(ref(db, `rooms/${currentRoom}/players/${tid}/hp`)).then(s => {
            update(ref(db, `rooms/${currentRoom}/players/${tid}`), { hp: (s.val() || 100) - 35 });
          });
        }
      });

      function initJoystick() {
        nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' })
        .on('move', (evt, data) => {
          // ถ้าโดนสิง จะขยับเองไม่ได้
          get(ref(db, `rooms/${currentRoom}/players/${myRole}/possessedBy`)).then(s => {
            if(s.val()) return;
            const rig = document.querySelector('#rig'), cam = document.querySelector('#camera');
            let r = cam.getAttribute('rotation').y * Math.PI / 180;
            let p = rig.getAttribute('position');
            let f = Math.sin(data.angle.radian) * moveSpeed, s_dir = Math.cos(data.angle.radian) * moveSpeed;
            p.x -= (Math.sin(r) * f + Math.cos(r) * s_dir); p.z -= (Math.cos(r) * f - Math.sin(r) * s_dir);
            rig.setAttribute('position', p);
          });
        });
      }
    </script>
  </body>
            </html>
