<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Island Survival v1.6 - Skin & Crosshair Back!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
      #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 1000; color: white; }
      .skin-container { display: flex; gap: 15px; margin: 20px 0; }
      .skin-btn { width: 80px; height: 80px; border: 3px solid #fff; border-radius: 10px; cursor: pointer; overflow: hidden; }
      .skin-btn.active { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; }
      .skin-btn img { width: 100%; height: 100%; object-fit: cover; }
      .role-btn { padding: 15px; margin: 5px; width: 220px; border-radius: 10px; border: 2px solid #fff; background: #333; color: #fff; font-weight: bold; font-size: 16px; }
      #ui-layer { position: absolute; top: 15px; left: 15px; z-index: 999; color: #fff; pointer-events: none; text-shadow: 2px 2px #000; }
      #touch-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; }
      #controls-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 998; pointer-events: none; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
      .fire-btn { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; border-radius: 50%; background: #ff4444; color: white; border: 4px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; z-index: 1001; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>

    <div id="main-menu">
      <h1 style="color: #00ffcc;">เกาะมหาสนุก v1.6</h1>
      <p>1. เลือกสกิน</p>
      <div class="skin-container">
        <div class="skin-btn active" onclick="selectSkin('#imgRed', this)"><img src="jjs.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgBlue', this)"><img src="jjkl.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgHerta', this)"><img src="The Herta.png"></div>
        <div class="skin-btn" onclick="selectSkin('#imgSparcy', this)"><img src="Sparcy.png"></div>
      </div>
      <p>2. เลือกเครื่องเล่น</p>
      <button class="role-btn" onclick="startGame('P1')">อาจารย์ (P1)</button>
      <button class="role-btn" onclick="startGame('P2')">พี่ชาย (P2)</button>
      <button class="role-btn" onclick="startGame('P3')">เพื่อน (P3)</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="my-id-text" style="color:gold; font-size:20px;"></div>
      <div>เลือด: <span id="hp-text">100</span></div>
    </div>

    <div id="touch-area" class="hidden"></div>

    <div id="controls-ui" class="hidden">
      <div id="joystick-zone"></div>
      <div id="shoot-btn" class="fire-btn">ยิง!!</div>
    </div>

    <a-scene vr-mode-ui="enabled: false" ar-mode-ui="enabled: false" renderer="colorManagement: true;">
      <a-assets>
        <a-asset-item id="gunModel" src="asd.glb"></a-asset-item>
        <a-asset-item id="islandModel" src="city.glb"></a-asset-item>
        <img id="imgRed" src="jjs.png">
        <img id="imgBlue" src="jjkl.png">
        <img id="imgHerta" src="The Herta.png">
        <img id="imgSparcy" src="Sparcy.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity id="island" gltf-model="#islandModel" position="0 -1.5 -25" scale="0.1 0.1 0.1"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0">
          <a-entity id="weapon" gltf-model="#gunModel" position="0.3 -0.4 -0.6" rotation="0 -10 0" scale="0.4 0.4 0.4"></a-entity>
          <a-entity id="cursor-visual" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.018" material="color: #00ff00; shader: flat; opacity: 0.8"></a-entity>
        </a-entity>
        <a-image id="my-skin-display" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
      </a-entity>

      <a-entity id="player-P1" visible="false">
        <a-image id="img-P1" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
        <a-box class="targetable" data-id="P1" opacity="0" width="4" height="5" depth="1" position="0 2 0"></a-box>
      </a-entity>
      <a-entity id="player-P2" visible="false">
        <a-image id="img-P2" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
        <a-box class="targetable" data-id="P2" opacity="0" width="4" height="5" depth="1" position="0 2 0"></a-box>
      </a-entity>
      <a-entity id="player-P3" visible="false">
        <a-image id="img-P3" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
        <a-box class="targetable" data-id="P3" opacity="0" width="4" height="5" depth="1" position="0 2 0"></a-box>
      </a-entity>
    </a-scene>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = { databaseURL: "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/" };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let health = 100;
      let myRole = "";
      let mySkin = "#imgRed";
      let yaw = 0;

      // ระบบเลือกสกิน
      window.selectSkin = function(skinId, btn) {
        mySkin = skinId;
        document.querySelectorAll('.skin-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('my-skin-display').setAttribute('src', skinId);
      }

      // ระบบลากนิ้วหันหน้า
      const touchArea = document.getElementById('touch-area');
      let isDragging = false, lastX = 0;
      touchArea.addEventListener('touchstart', e => { isDragging = true; lastX = e.touches[0].clientX; });
      touchArea.addEventListener('touchmove', e => {
        if (!isDragging) return;
        let deltaX = e.touches[0].clientX - lastX;
        lastX = e.touches[0].clientX;
        yaw -= deltaX * 0.25;
        document.getElementById('camera').setAttribute('rotation', `0 ${yaw} 0`);
      });
      touchArea.addEventListener('touchend', () => { isDragging = false; });

      window.startGame = function(role) {
        myRole = role;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('touch-area').classList.remove('hidden');
        document.getElementById('controls-ui').classList.remove('hidden');
        document.getElementById('my-id-text').innerText = "คุณคือ: " + role;
        
        // ส่งตำแหน่งและสกินเข้า Firebase
        setInterval(() => {
          const rig = document.getElementById('rig');
          const cam = document.getElementById('camera');
          update(ref(db, 'players/' + myRole), {
            p: rig.getAttribute('position'),
            r: cam.getAttribute('rotation'),
            hp: health,
            skin: mySkin
          });
        }, 50);

        // ดึงข้อมูลเพื่อนมาแสดง (รวมถึงสกินของเพื่อน)
        onValue(ref(db, 'players'), (snap) => {
          const players = snap.val();
          for (let id in players) {
            if (id === myRole) {
              health = players[id].hp;
              document.getElementById('hp-text').innerText = health;
              if (health <= 0) { 
                alert("ตายแล้ว! กำลังคืนชีพ..."); 
                update(ref(db, 'players/'+myRole), {hp:100}); 
              }
            } else {
              const ent = document.getElementById('player-' + id);
              const img = document.getElementById('img-' + id);
              if (ent) {
                ent.setAttribute('visible', players[id].hp > 0);
                ent.setAttribute('position', players[id].p);
                ent.setAttribute('rotation', players[id].r);
                if(players[id].skin) img.setAttribute('src', players[id].skin);
              }
            }
          }
        });
        initJoystick();
      }

      // ระบบยิงโดยใช้เป้ากลางจอ
      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const weapon = document.getElementById('weapon');
        weapon.setAttribute('position', '0.3 -0.4 -0.4');
        setTimeout(() => weapon.setAttribute('position', '0.3 -0.4 -0.6'), 60);

        const cam = document.getElementById('camera');
        const raycaster = new THREE.Raycaster();
        const direction = new THREE.Vector3(0, 0, -1);
        direction.applyQuaternion(cam.object3D.quaternion);
        raycaster.set(cam.object3D.getWorldPosition(new THREE.Vector3()), direction);

        const targetBoxes = document.querySelectorAll('.targetable');
        const meshes = Array.from(targetBoxes).map(t => t.getObject3D('mesh')).filter(m => m);
        const intersects = raycaster.intersectObjects(meshes);

        if (intersects.length > 0) {
          const hitId = intersects[0].object.el.dataset.id;
          if (hitId !== myRole) {
            onValue(ref(db, `players/${hitId}/hp`), snap => {
              let currentHp = snap.val() || 100;
              update(ref(db, `players/${hitId}`), { hp: currentHp - 20 });
            }, { onlyOnce: true });
          }
        }
      });

      function initJoystick() {
        const manager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' });
        manager.on('move', (evt, data) => {
          const rig = document.querySelector('#rig');
          const rotY = yaw * Math.PI / 180;
          let pos = rig.getAttribute('position');
          let speed = 0.3;
          let moveF = Math.sin(data.angle.radian) * speed;
          let moveS = Math.cos(data.angle.radian) * speed;
          pos.x -= (Math.sin(rotY) * moveF + Math.cos(rotY) * moveS);
          pos.z -= (Math.cos(rotY) * moveF - Math.sin(rotY) * moveS);
          rig.setAttribute('position', pos);
        });
      }
    </script>
  </body>
  </html>
