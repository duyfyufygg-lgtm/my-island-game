<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Island Survival v3.4.6 - In-Game Admin Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
      
      /* Effects */
      #stink-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle, rgba(100,255,0,0) 30%, rgba(50,100,0,0.6) 100%); pointer-events:none; z-index:2000; display:none; }
      #hack-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: repeating-linear-gradient(0deg, rgba(150,0,255,0.15) 0px, rgba(150,0,255,0.15) 2px, transparent 3px); pointer-events:none; z-index:2001; display:none; }
      #possession-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.3); border: 15px double red; pointer-events:none; z-index:2002; display:none; color: white; text-align: center; flex-direction: column; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; }

      /* ย้ายปุ่ม ADMIN มาไว้ที่มุมขวาบน (เพื่อไม่ให้ทับปุ่มโจมตี) */
      #admin-ingame-btn { 
        position: absolute; 
        top: 15px; 
        right: 15px; 
        width: 60px; 
        height: 35px; 
        background: rgba(255, 0, 0, 0.6); /* สีแดงกึ่งโปร่งใส */
        border: 2px solid white;
        border-radius: 8px;
        z-index: 5000; 
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 11px;
        font-weight: bold;
        pointer-events: auto; /* ให้กดได้ */
      }

      #admin-panel { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 6000; display:none; flex-direction: column; justify-content: center; align-items: center; color: white; }

      /* Menu & Lobby UI */
      #lobby-screen, #main-menu, #tank-menu { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#111; z-index:4000; color:white; }
      .room-list { width: 85%; height: 200px; overflow-y: auto; background: #222; margin: 15px; border-radius: 10px; padding: 10px; border: 1px solid #444; }
      .room-item { background: #333; margin: 8px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
      .skin-container { display:flex; gap:10px; margin:15px 0; flex-wrap:wrap; justify-content:center; max-width: 90%; }
      .skin-btn { width:60px; height:60px; border:2px solid #fff; border-radius:10px; overflow:hidden; }
      .skin-btn.active { border-color:#00ffcc; transform: scale(1.1); }
      .role-btn { padding:14px; margin:6px; width:240px; border-radius:12px; border:2px solid #fff; background:none; color:#fff; font-weight:bold; cursor:pointer; }
      
      /* Game HUD */
      #ui-layer { position:absolute; top:15px; left:15px; z-index:999; color:#fff; pointer-events:none; }
      #controls-ui { position:absolute; bottom:0; left:0; width:100%; height:100%; z-index:998; pointer-events:none; }
      #joystick-zone { position:absolute; bottom:40px; left:40px; width:120px; height:120px; pointer-events:auto; }
      .fire-btn { position:absolute; bottom:50px; right:40px; width:90px; height:90px; border-radius:50%; background:#ff4444; color:white; border:4px solid #fff; pointer-events:auto; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size: 18px; }
      .hidden { display:none !important; }
    </style>
  </head>
  <body>

    <div id="stink-overlay"></div>
    <div id="hack-overlay"></div>
    <div id="possession-overlay"><span>⚠️ YOU ARE POSSESSED! ⚠️</span></div>

    <div id="lobby-screen">
      <h1 style="color: #00ffcc;">SELECT SERVER</h1>
      <div class="room-list" id="room-list-ui">Searching...</div>
      <button class="role-btn" onclick="createRoom()" style="background:#00ffcc; color:black;">+ NEW SERVER</button>
    </div>

    <div id="admin-panel">
      <h2 style="color:red;">GOD MODE</h2>
      <div id="admin-login-area">
        <input type="password" id="admin-pass" placeholder="Password" style="padding:12px; margin-bottom:10px;">
        <button class="role-btn" onclick="checkAdmin()">LOGIN</button>
      </div>
      <div id="admin-tools" style="display:none; text-align:center;">
          <button class="role-btn" id="btn-inviz" onclick="toggleInvisible()">1. ล่องหน (OFF)</button>
          <button class="role-btn" onclick="massEffect('hacked')">2. แฮกยกห้อง</button>
          <button class="role-btn" onclick="massEffect('stink')">3. เหม็นยกห้อง</button>
          <button class="role-btn" id="btn-posses" onclick="togglePossession()">4. สิงร่าง (OFF)</button>
          <button class="role-btn" style="background:red;" onclick="adminKillAll()">RESET ROOM</button>
      </div>
      <button class="role-btn" onclick="document.getElementById('admin-panel').style.display='none'">BACK</button>
    </div>

    <div id="ui-layer" class="hidden">
      <div style="font-size: 20px;">HP: <span id="hp-text">100</span></div>
    </div>

    <div id="controls-ui" class="hidden">
      <div id="joystick-zone"></div>
      <div id="shoot-btn" class="fire-btn">FIRE</div>
      <div id="admin-ingame-btn" onclick="showAdminPanel()">ADMIN</div>
    </div>

    <div id="main-menu" class="hidden">... (Skin Selection Buttons) ...</div>
    <div id="tank-menu" class="hidden">... (Tank Models Buttons) ...</div>

    <a-scene renderer="antialias: false; precision: medium;">
      <a-assets timeout="20000">
        <a-asset-item id="gunModel" src="asd.glb"></a-asset-item>
        <a-asset-item id="axeModel" src="fps.glb"></a-asset-item> 
        <a-asset-item id="islandModel" src="city.glb"></a-asset-item>
        <a-asset-item id="tankModel" src="T-Rex.glb"></a-asset-item>
        <a-asset-item id="binModel" src="bin.glb"></a-asset-item>
        <a-asset-item id="faeModel" src="Fae.glb"></a-asset-item>
        <img id="imgRed" src="jjs.png"><img id="imgBlue" src="jjkl.png">
        <img id="imgHerta" src="The Herta.png"><img id="imgSparcy" src="Sparcy.png"><img id="img67" src="67.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity id="island" gltf-model="#islandModel" position="0 -1.5 -25" scale="0.1 0.1 0.1"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0">
          <a-entity id="weapon-P1" gltf-model="#gunModel" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4" visible="false"></a-entity>
          <a-entity id="weapon-P2" gltf-model="#axeModel" position="0.2 -0.6 -0.8" scale="1.2 1.2 1.2" rotation="0 180 0" visible="false"></a-entity>
          <a-entity id="weapon-P3" gltf-model="#gunModel" position="0.3 -0.4 -0.6" scale="0.4 0.4 0.4" visible="false"></a-entity>
        </a-entity>
        <a-image id="my-skin-display" width="4" height="4" position="0 2 0"></a-image>
        <a-entity id="my-tank-model" scale="1.5 1.5 1.5" position="0 -1.5 0" rotation="0 180 0" visible="false"></a-entity>
      </a-entity>

      <a-entity id="player-P1" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P1" opacity="0" width="4" height="5"></a-box></a-entity>
      <a-entity id="player-P2" visible="false"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box class="targetable" data-id="P2" opacity="0" width="4" height="5"></a-box></a-entity>
      <a-entity id="player-P3" visible="false"><a-entity id="player-P3-model" scale="1.5 1.5 1.5" position="0 -1.5 0"></a-entity><a-box class="targetable" data-id="P3" opacity="0" width="5" height="6"></a-box></a-entity>
    </a-scene>

    <script type="module">
      /* ... Sync Logic & Admin Functions เหมือน V3.4.5 ... */
      // เน้นจุดที่แสดงผล Admin
      window.showAdminPanel = () => { 
        document.getElementById('admin-panel').style.display='flex'; 
        console.log("Admin Panel Opened");
      };
      
      // ฟังก์ชันอื่นๆ เหมือนเดิมเป๊ะครับ
      /* [ตัดส่วน Script เดิมมาแปะได้เลยครับ] */
    </script>
  </body>
  </html>
