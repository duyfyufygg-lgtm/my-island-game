<!DOCTYPE html>
<html>
<head>
    <title>Island Survival: One Server Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js" } }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 100; color: white; text-shadow: 2px 2px #000; pointer-events: none; }
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; text-align: center; color: white; z-index: 200; border: 3px solid #00ffcc; box-shadow: 0 0 30px rgba(0,255,204,0.5); }
        .hidden { display: none !important; }
        button { padding: 12px 25px; margin: 8px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { transform: scale(1.1); }
        .btn-atk { position: absolute; bottom: 30px; right: 30px; width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(#ff0000, #990000); color: white; z-index: 100; border: 5px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #joy { position: absolute; bottom: 30px; left: 30px; width: 130px; height: 130px; z-index: 100; }
        #hacker-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(150, 0, 255, 0.3); pointer-events: none; z-index: 50; display: none; border: 8px solid purple; animation: flash 0.15s infinite; }
        @keyframes flash { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="hp-display" style="font-size: 40px; margin: 0;">HP: --</h1>
        <p id="status-text" style="color: #00ffcc;">Status: Connecting to Global Server...</p>
    </div>

    <div id="start-menu" class="menu">
        <h2 style="color: #00ffcc; margin-top: 0;">ISLAND SURVIVAL v4.0</h2>
        <p>ยินดีต้อนรับสู่เซิร์ฟเวอร์หลัก เลือกสายเพื่อเข้าสู่เกาะ:</p>
        <button style="background: #a349a4; color: white;" onclick="joinGame('Speed')">สายไว (Silver Wolf)</button>
        <button style="background: #ed1c24; color: white;" onclick="joinGame('Atk')">สายตี (T-Rex)</button>
        <button style="background: #ff7f27; color: white;" onclick="joinGame('Tank')">สายถึก (Trash Can)</button>
    </div>

    <div id="admin-login" class="menu hidden">
        <h3 style="color: #ff0000;">RESTRICTED AREA</h3>
        <input type="password" id="admin-pass" placeholder="Enter Admin Password" style="padding:12px; width: 80%; border-radius:5px; margin-bottom:15px;">
        <br>
        <button style="background:#00ffcc; color:black; width: 100%;" onclick="checkAdmin()">VERIFY IDENTITY</button>
        <p style="cursor:pointer; font-size:12px; margin-top:10px;" onclick="closeAdmin()">Go Back</p>
    </div>

    <div id="admin-panel" class="hidden" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.9); padding:20px; border:2px solid #00ffcc; z-index:5000; border-radius:15px; color:white; width: 220px;">
        <h4 style="margin:0 0 15px 0; color:#00ffcc; text-align:center;">SERVER MANAGER</h4>
        <button id="ghost-btn" onclick="toggleGhost()" style="width:100%; margin-bottom:10px; background:#333; color:white; border:1px solid #00ffcc;">GHOST MODE: OFF</button>
        <button onclick="chaosHack()" style="width:100%; background:linear-gradient(to bottom, #9600ff, #4b0082); color:white; height: 50px;">CHAOS HACK (ALL)</button>
        <button onclick="closeAdminPanel()" style="width:100%; background:none; color:#666; border:none; margin-top:10px; font-size:12px;">Hide Menu</button>
    </div>

    <div id="hacker-fx"></div>
    <div id="joy"></div>
    <button id="atk-btn" class="btn-atk hidden" onclick="attack()">ATK</button>
    
    <div onclick="openAdmin()" style="position:absolute; bottom:0; right:0; width:20px; height:20px; opacity:0.05; z-index:10000; cursor:pointer; background: white;"></div>

    <a-scene fog="type: linear; color: #87CEEB; far: 50; near: 0">
        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 0 0" rotation="-90 0 0" width="200" height="200" color="#4CAF50"></a-plane>
        
        <a-entity id="camera-rig" position="0 1.6 0">
            <a-camera id="cam" look-controls="pointerLockEnabled: false">
                <a-cursor id="cursor" color="red" scale="2 2 2"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="players-container"></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update, onDisconnect, get } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://duyfyufygg-lgtm.github.io/my-island-game/" }; // ใช้ลิงก์เดิมของอาจารย์
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = "UID-" + Math.random().toString(36).substr(2, 9);
        let myRole = "";
        let hp = 100;
        let isGhost = false;
        let moveData = { x: 0, z: 0 };

        window.joinGame = (role) => {
            myRole = role;
            hp = (role === 'Tank') ? 300 : 100;
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('atk-btn').classList.remove('hidden');
            document.getElementById('hp-display').innerText = "HP: " + hp;
            document.getElementById('status-text').innerText = "Status: Online | Role: " + role;
            
            set(ref(db, 'global_server/' + myId), {
                id: myId, role: role, x: 0, y: 1.6, z: 0, hp: hp,
                hacked: false, isGhost: false, ry: 0
            });
            onDisconnect(ref(db, 'global_server/' + myId)).remove();
        };

        const manager = nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: { left: '80px', bottom: '80px' }, color: 'cyan' });
        manager.on('move', (evt, data) => {
            const angle = data.angle.radian;
            const force = data.force > 1 ? 1 : data.force;
            moveData.x = Math.cos(angle) * force * 0.25;
            moveData.z = -Math.sin(angle) * force * 0.25;
        });
        manager.on('end', () => { moveData = { x: 0, z: 0 }; });

        setInterval(() => {
            if (!myRole) return;
            const camRig = document.getElementById('camera-rig');
            const cam = document.getElementById('cam');
            let rotation = cam.getAttribute('rotation').y * (Math.PI / 180);
            let worldX = moveData.x * Math.cos(rotation) + moveData.z * Math.sin(rotation);
            let worldZ = -moveData.x * Math.sin(rotation) + moveData.z * Math.cos(rotation);
            
            camRig.object3D.position.x += worldX;
            camRig.object3D.position.z += worldZ;

            update(ref(db, 'global_server/' + myId), {
                x: camRig.object3D.position.x,
                z: camRig.object3D.position.z,
                ry: cam.getAttribute('rotation').y
            });
        }, 30);

        onValue(ref(db, 'global_server'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('players-container');
            if (!data) return;

            if (data[myId]) {
                hp = data[myId].hp;
                document.getElementById('hp-display').innerText = isGhost ? "HP: GOD" : "HP: " + hp;
                document.getElementById('hacker-fx').style.display = data[myId].hacked ? 'block' : 'none';
                if (hp <= 0 && !isGhost) { 
                    alert("Game Over! คุณถูกกำจัด"); 
                    location.reload(); 
                }
            }

            Object.keys(data).forEach(id => {
                if (id === myId) return;
                let p = data[id];
                let el = document.getElementById(id);
                if (!el) {
                    el = document.createElement('a-box');
                    el.setAttribute('id', id);
                    el.setAttribute('width', 0.9); el.setAttribute('height', 1.8);
                    container.appendChild(el);
                    let txt = document.createElement('a-text');
                    txt.setAttribute('value', p.role); txt.setAttribute('align', 'center');
                    txt.setAttribute('position', '0 1.3 0'); txt.setAttribute('color', 'white');
                    txt.setAttribute('width', 4); el.appendChild(txt);
                }
                el.setAttribute('visible', !p.isGhost && p.hp > 0);
                el.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
                el.setAttribute('rotation', `0 ${p.ry} 0`);
                el.setAttribute('color', p.role === 'Tank' ? '#ff7f27' : (p.role === 'Speed' ? '#a349a4' : '#ed1c24'));
            });
        });

        window.attack = () => {
            const intersection = document.querySelector('a-cursor').components.raycaster.intersections[0];
            if (intersection && intersection.object.el.id) {
                const targetId = intersection.object.el.id;
                get(ref(db, `global_server/${targetId}`)).then(snap => {
                    if (snap.exists()) {
                        const t = snap.val();
                        let dmg = (myRole === 'Atk') ? 25 : 8;
                        update(ref(db, `global_server/${targetId}`), { 
                            hp: t.hp - dmg,
                            hacked: (myRole === 'Speed' ? true : t.hacked)
                        });
                    }
                });
            }
        };

        // ADMIN LOGIC
        window.openAdmin = () => document.getElementById('admin-login').classList.remove('hidden');
        window.closeAdmin = () => document.getElementById('admin-login').classList.add('hidden');
        window.checkAdmin = () => {
            if (document.getElementById('admin-pass').value === 'the-herta-game') {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            } else { alert('ACCESS DENIED!'); }
        };
        window.toggleGhost = () => {
            isGhost = !isGhost;
            update(ref(db, `global_server/${myId}`), { isGhost: isGhost, hp: 999999 });
            document.getElementById('ghost-btn').innerText = isGhost ? "GHOST: ON" : "GHOST: OFF";
            document.getElementById('ghost-btn').style.background = isGhost ? "#00ffcc" : "#333";
        };
        window.chaosHack = () => {
            get(ref(db, 'global_server')).then(snap => {
                const players = snap.val();
                Object.keys(players).forEach(id => {
                    if (id !== myId) update(ref(db, `global_server/${id}`), { hacked: true, hp: 5 });
                });
            });
            alert('SYSTEM OVERRIDE: ALL USERS HACKED');
        };
        window.closeAdminPanel = () => document.getElementById('admin-panel').classList.add('hidden');
    </script>
</body>
                                                                                                                                                                        </html>
