<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Island Survival v1.4 - Assets Fixed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
      #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 1000; color: white; }
      #online-setup { display: none; flex-direction: column; align-items: center; }
      .role-btn { padding: 12px 30px; margin: 8px; border-radius: 10px; border: 2px solid #fff; cursor: pointer; color: white; font-weight: bold; width: 220px; }
      .menu-btn { padding: 15px 50px; font-size: 20px; border-radius: 10px; cursor: pointer; border: none; margin: 10px; font-weight: bold; background: #00ffcc; color: black; }
      #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 999; color: white; pointer-events: none; text-shadow: 2px 2px #000; }
      #controls-ui { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 998; pointer-events: none; }
      #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
      .fire-btn { position: absolute; bottom: 50px; right: 40px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255, 0, 0, 0.8); color: white; border: 4px solid #fff; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
      .hidden { display: none !important; }
      /* แก้ปัญหาจอดำ/ไม่โหลด */
      a-scene { width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="main-menu">
      <h1 style="color: #00ffcc;">เกาะมหาสนุก v1.4</h1>
      <div id="initial-menu">
        <button class="menu-btn" onclick="startGame('solo')">เล่นคนเดียว</button>
        <button class="menu-btn" style="background:#555; color:white; margin-top:15px;" onclick="showOnlineSetup()">ออนไลน์</button>
      </div>
      <div id="online-setup">
        <p>เลือกตัวละคร</p>
        <button class="role-btn" style="background:#e67e22;" onclick="startGame('multi', 'P1')">อาจารย์ (P1)</button>
        <button class="role-btn" style="background:#3498db;" onclick="startGame('multi', 'P2')">พี่ชาย (P2)</button>
        <button class="role-btn" style="background:#9b59b6;" onclick="startGame('multi', 'P3')">เพื่อน (P3)</button>
      </div>
    </div>

    <div id="ui-layer" class="hidden">
      <div id="my-id-display"></div>
      <div>เลือด: <span id="hp-text">100</span></div>
    </div>

    <div id="controls-ui" class="hidden">
      <div id="joystick-zone"></div>
      <div id="shoot-btn" class="fire-btn">ยิง!!</div>
    </div>

    <a-scene vr-mode-ui="enabled: false" loading-screen="dotsColor: #00ffcc; backgroundColor: black">
      <a-assets timeout="10000">
        <a-asset-item id="gunModel" src="./asd.glb"></a-asset-item>
        <a-asset-item id="islandModel" src="./city.glb"></a-asset-item>
        <img id="imgRed" src="./jjs.png">
        <img id="imgBlue" src="./jjkl.png">
        <img id="imgHerta" src="./The Herta.png">
        <img id="imgSparcy" src="./Sparcy.png">
      </a-assets>

      <a-sky color="#87CEEB"></a-sky>
      <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
      <a-entity id="island" gltf-model="#islandModel" position="0 -1.5 -30" scale="0.1 0.1 0.1"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera position="0 1.6 0" look-controls="touchEnabled: true">
          <a-entity id="weapon" gltf-model="#gunModel" position="0.3 -0.4 -0.6" rotation="0 -10 0" scale="0.4 0.4 0.4" visible="false"></a-entity>
          <a-entity id="crosshair" cursor="rayOrigin: mouse" raycaster="objects: .targetable; far: 100"></a-entity>
        </a-entity>
        <a-image id="my-avatar" src="#imgRed" width="4" height="4" position="0 2 0"></a-image>
      </a-entity>

      <a-entity id="player-P1" class="targetable" visible="false" data-id="P1"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box opacity="0" width="4" height="4" depth="1"></a-box></a-entity>
      <a-entity id="player-P2" class="targetable" visible="false" data-id="P2"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box opacity="0" width="4" height="4" depth="1"></a-box></a-entity>
      <a-entity id="player-P3" class="targetable" visible="false" data-id="P3"><a-image src="#imgRed" width="4" height="4" position="0 2 0"></a-image><a-box opacity="0" width="4" height="4" depth="1"></a-box></a-entity>
      <a-image id="bot-enemy" class="targetable" src="#imgRed" position="0 3 -20" width="6" height="6" visible="false" data-id="BOT" data-hp="100"></a-image>
    </a-scene>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = { databaseURL: "https://the-herta-cf467-default-rtdb.asia-southeast1.firebasedatabase.app/" };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      let health = 100;
      let myRole = "";

      // ล็อคหันซ้ายขวาอย่างเดียว
      function lockPitch() {
        const cam = document.getElementById('camera');
        if (cam) {
          let rot = cam.getAttribute('rotation');
          if (rot.x !== 0) cam.setAttribute('rotation', {x: 0, y: rot.y, z: 0});
        }
        requestAnimationFrame(lockPitch);
      }
      lockPitch();

      window.showOnlineSetup = function() {
        document.getElementById('initial-menu').classList.add('hidden');
        document.getElementById('online-setup').style.display = 'flex';
      }

      window.startGame = function(mode, role) {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('controls-ui').classList.remove('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
        document.querySelector('#weapon').setAttribute('visible', 'true');
        if (mode === 'multi') {
          myRole = role;
          document.getElementById('my-id-display').innerText = "คุณคือ: " + role;
          startFirebaseSync();
        } else {
          document.getElementById('bot-enemy').setAttribute('visible', 'true');
        }
        initJoystick();
      }

      function startFirebaseSync() {
        setInterval(() => {
          const rig = document.getElementById('rig');
          update(ref(db, 'players/' + myRole), {
            p: rig.getAttribute('position'),
            r: rig.getAttribute('rotation'),
            hp: health
          });
        }, 50);

        ["P1", "P2", "P3"].forEach(id => {
          if (id !== myRole) {
            onValue(ref(db, 'players/' + id), (snap) => {
              const data = snap.val();
              const ent = document.getElementById('player-' + id);
              if (data && data.hp > 0) {
                ent.setAttribute('visible', 'true');
                ent.setAttribute('position', data.p);
                ent.setAttribute('rotation', data.r);
              } else { ent.setAttribute('visible', 'false'); }
            });
          }
        });
      }

      document.getElementById('shoot-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const raycaster = document.querySelector('#camera').components.raycaster;
        const intersections = raycaster.intersections;
        if (intersections.length > 0) {
          const targetEl = intersections[0].object.el;
          const targetId = targetEl.dataset.id || (targetEl.parentElement ? targetEl.parentElement.dataset.id : null);
          if (targetId && targetId !== 'BOT' && targetId !== myRole) {
             onValue(ref(db, 'players/' + targetId + '/hp'), (snap) => {
                let hp = snap.val() || 100;
                update(ref(db, 'players/' + targetId), { hp: hp - 20 });
             }, { onlyOnce: true });
          }
        }
      });

      function initJoystick() {
        const manager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: 'white' });
        manager.on('move', (evt, data) => {
          const rig = document.querySelector('#rig');
          const cam = document.querySelector('#camera');
          let rot = cam.getAttribute('rotation').y * Math.PI / 180;
          let pos = rig.getAttribute('position');
          let speed = 0.28;
          let moveF = Math.sin(data.angle.radian) * speed;
          let moveS = Math.cos(data.angle.radian) * speed;
          pos.x -= (Math.sin(rot) * moveF + Math.cos(rot) * moveS);
          pos.z -= (Math.cos(rot) * moveF - Math.sin(rot) * moveS);
          rig.setAttribute('position', pos);
        });
      }
    </script>
  </body>
  </html>
