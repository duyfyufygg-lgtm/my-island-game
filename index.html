<!DOCTYPE html>
<html>
<head>
    <title>The Herta Survival - DOT Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <script type="importmap">
        { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js" } }
    </script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; color: white; text-shadow: 2px 2px black; pointer-events: none; }
        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center; color: white; z-index: 200; border: 2px solid #00ffcc; }
        .hidden { display: none !important; }
        button { padding: 12px 24px; margin: 8px; cursor: pointer; font-weight: bold; border-radius: 8px; border: none; font-size: 16px; }
        #confirm-btn { background: #00ffcc; color: #000; width: 100%; margin-top: 15px; }
        
        /* เอฟเฟคหน้าจอ */
        #hit-effect { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; pointer-events: none; z-index: 150; }
        #hacked-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(150, 0, 255, 0.3); border: 15px solid purple; display: none; pointer-events: none; z-index: 140; animation: flash 0.2s infinite; }
        #stink-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 255, 0, 0.2); border: 20px solid #4b5320; display: none; pointer-events: none; z-index: 140; animation: shake 0.3s infinite; }
        
        @keyframes flash { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }

        .btn-atk { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; border-radius: 50%; background: red; color: white; z-index: 100; border: 5px solid white; }
        #joy { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui"><h1 id="hp-display">HP: --</h1><p id="debuff-status"></p></div>
    <div id="hit-effect"></div>
    <div id="hacked-screen"></div>
    <div id="stink-screen"></div>

    <div id="start-menu" class="menu">
        <h2 style="color:#00ffcc;">THE HERTA GAME</h2>
        <button onclick="selectRole('Speed', this)" style="background:#a349a4; color:white;">SPEED (Silver Wolf)</button>
        <button onclick="selectRole('Atk', this)" style="background:#ed1c24; color:white;">ATK (T-Rex)</button>
        <button onclick="selectRole('Tank', this)" style="background:#ff7f27; color:white;">TANK (ถังขยะ)</button>
        <button id="confirm-btn" class="hidden" onclick="confirmJoin()">JOIN GAME</button>
    </div>

    <div id="joy"></div>
    <button id="atk-btn" class="btn-atk hidden" onclick="attack()">ATK</button>
    
    <a-scene>
        <a-assets>
            <a-asset-item id="city-m" src="city.glb"></a-asset-item>
            <a-asset-item id="trex-m" src="T-Rex.glb"></a-asset-item>
            <a-asset-item id="bin-m" src="bin.glb"></a-asset-item>
            <a-asset-item id="fae-m" src="fae.glb"></a-asset-item>
            <a-asset-item id="hand-m" src="asd.glb"></a-asset-item>
            <img id="sky-img" src="the.png">
        </a-assets>
        <a-sky src="#sky-img"></a-sky>
        <a-entity gltf-model="#city-m" position="0 -1 0"></a-entity>
        <a-entity id="camera-rig" position="0 1.6 0">
            <a-camera id="cam" look-controls="pointerLockEnabled: false">
                <a-entity id="my-hand" gltf-model="#hand-m" position="0.3 -0.4 -0.5" rotation="0 180 0" visible="false"></a-entity>
                <a-cursor color="cyan"></a-cursor>
            </a-camera>
        </a-entity>
        <a-entity id="players-container"></a-entity>
    </a-scene>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue, update, onDisconnect, get } from "firebase/database";

        const firebaseConfig = { databaseURL: "https://duyfyufygg-lgtm.github.io/my-island-game/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId = "ID-" + Math.floor(Math.random() * 9999);
        let myRole = "";
        let moveData = { x: 0, z: 0 };
        let dotTimer = null;

        window.selectRole = (role, btn) => {
            window.selectedRole = role;
            document.querySelectorAll('button').forEach(b => b.style.outline = "none");
            btn.style.outline = "4px solid #00ffcc";
            document.getElementById('confirm-btn').classList.remove('hidden');
        };

        window.confirmJoin = () => {
            myRole = window.selectedRole;
            let model = (myRole === 'Tank' ? '#bin-m' : (myRole === 'Atk' ? '#trex-m' : '#fae-m'));
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('atk-btn').classList.remove('hidden');
            document.getElementById('my-hand').setAttribute('visible', 'true');

            set(ref(db, 'server_dot/' + myId), {
                id: myId, role: myRole, x: 0, y: 1.6, z: 0, hp: (myRole === 'Tank' ? 350 : 100),
                ry: 0, model: model, hacked: 0, stinking: 0 
            });
            onDisconnect(ref(db, 'server_dot/' + myId)).remove();
        };

        // ระบบ Damage Over Time (DOT)
        setInterval(() => {
            if (!myRole) return;
            get(ref(db, 'server_dot/' + myId)).then(s => {
                if (!s.exists()) return;
                let data = s.val();
                let newHp = data.hp;
                let updates = {};

                // ถ้าโดนแฮ็ก (ดาเมจ 12 ทุก 1 วิ)
                if (data.hacked > 0) {
                    newHp -= 12;
                    updates.hacked = data.hacked - 1;
                }
                // ถ้าโดนเหม็น (ดาเมจ 3 ทุก 1 วิ)
                if (data.stinking > 0) {
                    newHp -= 3;
                    updates.stinking = data.stinking - 1;
                }

                if (newHp !== data.hp || Object.keys(updates).length > 0) {
                    updates.hp = newHp;
                    update(ref(db, 'server_dot/' + myId), updates);
                }
            });
        }, 1000);

        onValue(ref(db, 'server_dot'), (snapshot) => {
            const data = snapshot.val();
            if (!data || !data[myId]) return;

            const me = data[myId];
            document.getElementById('hp-display').innerText = "HP: " + me.hp;
            document.getElementById('hacked-screen').style.display = me.hacked > 0 ? 'block' : 'none';
            document.getElementById('stink-screen').style.display = me.stinking > 0 ? 'block' : 'none';
            
            let statusTxt = "";
            if(me.hacked > 0) statusTxt += `[HACKED: ${me.hacked}s] `;
            if(me.stinking > 0) statusTxt += `[STINKY: ${me.stinking}s]`;
            document.getElementById('debuff-status').innerText = statusTxt;

            if (me.hp <= 0) { alert("Game Over!"); location.reload(); }

            Object.keys(data).forEach(id => {
                if (id === myId) return;
                let p = data[id];
                let el = document.getElementById(id);
                if (!el) {
                    el = document.createElement('a-entity');
                    el.setAttribute('id', id);
                    el.setAttribute('gltf-model', p.model);
                    document.getElementById('players-container').appendChild(el);
                }
                el.setAttribute('position', `${p.x} 0.5 ${p.z}`);
                el.setAttribute('rotation', `0 ${p.ry} 0`);
            });
        });

        window.attack = () => {
            const hand = document.getElementById('my-hand');
            hand.setAttribute('animation', "property: position; to: 0.3 -0.4 -0.9; dur: 100; dir: alternate; loop: 2");

            const inter = document.querySelector('a-cursor').components.raycaster.intersections[0];
            if (inter && inter.object.el.id) {
                const tid = inter.object.el.id;
                get(ref(db, `server_dot/${tid}`)).then(s => {
                    if (s.exists()) {
                        let t = s.val();
                        update(ref(db, `server_dot/${tid}`), { 
                            hp: t.hp - (myRole === 'Atk' ? 20 : 5), // ดาเมจตั้งต้นตอนตี
                            hacked: (myRole === 'Speed' ? 10 : t.hacked), // ติดแฮ็ก 10 วิ
                            stinking: (myRole === 'Tank' ? 10 : t.stinking) // ติดเหม็น 10 วิ
                        });
                    }
                });
            }
        };

        // [Joystick & Movement Logic...]
        const manager = nipplejs.create({ zone: document.getElementById('joy'), mode: 'static', position: { left: '70px', bottom: '70px' } });
        manager.on('move', (e, d) => { moveData.x = Math.cos(d.angle.radian) * d.force * 0.2; moveData.z = -Math.sin(d.angle.radian) * d.force * 0.2; });
        manager.on('end', () => moveData = { x: 0, z: 0 });
        setInterval(() => {
            if (!myRole) return;
            const rig = document.getElementById('camera-rig');
            const cam = document.getElementById('cam');
            let ry = cam.getAttribute('rotation').y * (Math.PI / 180);
            rig.object3D.position.x += moveData.x * Math.cos(ry) + moveData.z * Math.sin(ry);
            rig.object3D.position.z += -moveData.x * Math.sin(ry) + moveData.z * Math.cos(ry);
            update(ref(db, 'server_dot/' + myId), { x: rig.object3D.position.x, z: rig.object3D.position.z, ry: cam.getAttribute('rotation').y });
        }, 30);
    </script>
</body>
</html>
